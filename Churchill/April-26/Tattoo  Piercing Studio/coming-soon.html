<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon - INK STUDIO</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicons/favicon.svg">
  <link rel="stylesheet" href="assets/css/main.css"><link rel="stylesheet" href="assets/css/animations.css">
  <style>
    main{padding-top:0!important;}
    .coming-soon{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:#0a0a0a;position:relative;overflow:hidden;}
    .coming-soon::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(220,38,38,0.08),transparent 70%);}
    .countdown{display:flex;gap:var(--space-6);justify-content:center;margin:var(--space-8) 0;}
    .countdown-item{text-align:center;}
    .countdown-value{font-family:var(--font-accent);font-size:clamp(2rem,6vw,3.5rem);color:#fff;display:block;line-height:1;}
    .countdown-label{font-size:0.75rem;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.15em;margin-top:var(--space-2);}
    .newsletter-form{max-width:400px;margin:0 auto;display:flex;gap:var(--space-3);}
    .newsletter-form input{flex:1;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;}
    .newsletter-form input::placeholder{color:rgba(255,255,255,0.4);}
  </style>
</head>
<body>
  <div class="coming-soon">
    <div style="position:relative;z-index:2;max-width:600px;padding:var(--space-8);">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:var(--space-3);text-decoration:none;margin-bottom:var(--space-10);">
        <svg width="40" height="40" viewBox="0 0 40 40"><rect width="40" height="40" rx="8" fill="transparent" stroke="rgba(255,255,255,0.2)" stroke-width="1"/><path d="M12,8 L16,8 L28,32 L24,34 L18,34 Z" fill="#dc2626" opacity="0.9"/><path d="M14,8 L18,8 L30,32 L26,34 L20,34 Z" fill="#f59e0b" opacity="0.7"/></svg>
        <span style="font-family:var(--font-accent);font-size:1.5rem;letter-spacing:0.15em;color:#fff;">INK <span style="color:var(--color-blood-red);">STUDIO</span></span>
      </a>

      <h1 style="color:#fff;font-size:clamp(2rem,5vw,3.5rem);margin-bottom:var(--space-4);">Coming Soon</h1>
      <p style="color:rgba(255,255,255,0.6);font-size:1.125rem;margin-bottom:var(--space-8);">We're working on something incredible. Stay tuned for our grand launch.</p>

      <div class="countdown" id="countdown">
        <div class="countdown-item"><span class="countdown-value" id="days">30</span><span class="countdown-label">Days</span></div>
        <div class="countdown-item"><span class="countdown-value" id="hours">12</span><span class="countdown-label">Hours</span></div>
        <div class="countdown-item"><span class="countdown-value" id="minutes">45</span><span class="countdown-label">Minutes</span></div>
        <div class="countdown-item"><span class="countdown-value" id="seconds">00</span><span class="countdown-label">Seconds</span></div>
      </div>

      <p style="color:rgba(255,255,255,0.5);font-size:0.875rem;margin-bottom:var(--space-4);">Get notified when we launch</p>
      <form class="newsletter-form" onsubmit="event.preventDefault();this.querySelector('button').textContent='Subscribed ✓';this.querySelector('input').disabled=true;">
        <input type="email" class="form-input" placeholder="Enter your email" required>
        <button type="submit" class="btn btn-primary">Notify Me</button>
      </form>

      <div style="margin-top:var(--space-12);display:flex;gap:var(--space-4);justify-content:center;">
        <a href="#" style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);transition:all var(--transition-fast);" aria-label="Instagram"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/></svg></a>
        <a href="#" style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);" aria-label="Facebook"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
        <a href="#" style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);" aria-label="Twitter"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg></a>
      </div>
    </div>
  </div>
  <script>
    // Countdown timer
    const launchDate = new Date();
    launchDate.setDate(launchDate.getDate() + 30);
    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;
      if (diff <= 0) return;
      document.getElementById('days').textContent = String(Math.floor(diff / 86400000)).padStart(2,'0');
      document.getElementById('hours').textContent = String(Math.floor((diff % 86400000) / 3600000)).padStart(2,'0');
      document.getElementById('minutes').textContent = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
      document.getElementById('seconds').textContent = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
