<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | INK STUDIO</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicons/favicon.svg">
  <link rel="stylesheet" href="assets/css/main.css"><link rel="stylesheet" href="assets/css/animations.css">
  <style>
    main{padding-top:0!important;}
    .error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;background:var(--bg-primary);position:relative;overflow:hidden;}
    .error-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
    .error-bg span{font-family:var(--font-accent);font-size:clamp(15rem,30vw,40rem);color:var(--bg-secondary);line-height:1;letter-spacing:-0.05em;user-select:none;}
    [data-theme="dark"] .error-bg span{color:var(--bg-dark-elevated);}
    .error-content{position:relative;z-index:2;max-width:500px;padding:var(--space-8);}
    .ink-splatter{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(220,38,38,0.15),transparent);pointer-events:none;}
  </style>
</head>
<body>
  <div class="error-page">
    <div class="ink-splatter" style="top:10%;left:10%;"></div>
    <div class="ink-splatter" style="bottom:15%;right:15%;width:150px;height:150px;background:radial-gradient(circle,rgba(245,158,11,0.1),transparent);"></div>
    <div class="error-bg"><span>404</span></div>
    <div class="error-content">
      <div style="margin-bottom:var(--space-6);">
        <a href="index.html" style="display:inline-flex;align-items:center;gap:var(--space-3);text-decoration:none;">
          <svg width="36" height="36" viewBox="0 0 40 40"><rect width="40" height="40" rx="8" fill="#0a0a0a"/><path d="M12,8 L16,8 L28,32 L24,34 L18,34 Z" fill="#dc2626" opacity="0.9"/><path d="M14,8 L18,8 L30,32 L26,34 L20,34 Z" fill="#f59e0b" opacity="0.7"/></svg>
          <span style="font-family:var(--font-accent);font-size:1.375rem;letter-spacing:0.15em;color:var(--text-primary);">INK <span style="color:var(--color-blood-red);">STUDIO</span></span>
        </a>
      </div>
      <h1 style="font-size:2rem;margin-bottom:var(--space-4);">Page Not Found</h1>
      <p style="font-size:1.0625rem;margin-bottom:var(--space-8);">Looks like this page went off the grid. The ink must have run out. Let's get you back on track.</p>
      <div style="display:flex;gap:var(--space-4);justify-content:center;flex-wrap:wrap;">
        <a href="index.html" class="btn btn-primary">Return Home</a>
        <a href="contact.html" class="btn btn-secondary">Contact Us</a>
      </div>
      <div style="margin-top:var(--space-10);">
        <p style="font-size:0.875rem;color:var(--text-muted);margin-bottom:var(--space-4);">Popular pages:</p>
        <div style="display:flex;gap:var(--space-4);justify-content:center;flex-wrap:wrap;">
          <a href="services.html" style="font-size:0.875rem;">Services</a>
          <a href="pricing.html" style="font-size:0.875rem;">Pricing</a>
          <a href="blog.html" style="font-size:0.875rem;">Blog</a>
          <a href="about.html" style="font-size:0.875rem;">About</a>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/theme-toggle.js"></script>
</body>
</html>
