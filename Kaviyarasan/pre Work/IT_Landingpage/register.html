<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - TechAssist IT Support</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
 

  <section class="auth-section">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo"><div class="logo-icon"><i class="fas fa-headset"></i></div> TechAssist</a>
        <h2 style="font-size:1.5rem;margin-bottom:.5rem">Create Account</h2>
        <p>Get started with a free 14-day trial</p>
      </div>
      <div class="auth-social">
        <button class="auth-social-btn"><i class="fab fa-google"></i> Google</button>
        <button class="auth-social-btn"><i class="fab fa-microsoft"></i> Microsoft</button>
      </div>
      <div class="auth-divider">or register with email</div>
      <form>
        <div class="form-row">
          <div class="form-group"><label>First Name</label><input type="text" class="form-control" placeholder="John"></div>
          <div class="form-group"><label>Last Name</label><input type="text" class="form-control" placeholder="Doe"></div>
        </div>
        <div class="form-group"><label>Email Address</label><input type="email" class="form-control" placeholder="you@company.com"></div>
        <div class="form-group"><label>Password</label><input type="password" class="form-control" placeholder="Min. 8 characters"></div>
        <label class="form-check"><input type="checkbox"> I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">Create Account</button>
      </form>
      <div class="auth-footer">Already have an account? <a href="login.html">Sign In</a></div>
    </div>
  </section>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/rtl-toggle.js"></script>
</body>
</html>
