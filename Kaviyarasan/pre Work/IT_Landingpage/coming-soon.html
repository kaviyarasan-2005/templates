<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon - TechAssist IT Support</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <section class="coming-soon-section">
    <div class="coming-soon-content">
      <a href="index.html" class="logo" style="justify-content:center;margin-bottom:2rem">
        <div class="logo-icon"><i class="fas fa-headset"></i></div> TechAssist
      </a>
      <h1>Something Amazing is <span style="color:var(--secondary)">Coming Soon</span></h1>
      <p>We're working on something new and exciting. Stay tuned for updates — sign up below to be the first to know.</p>
      <div class="countdown">
        <div class="countdown-item"><span class="number">30</span><span class="label">Days</span></div>
        <div class="countdown-item"><span class="number">00</span><span class="label">Hours</span></div>
        <div class="countdown-item"><span class="number">00</span><span class="label">Minutes</span></div>
        <div class="countdown-item"><span class="number">00</span><span class="label">Seconds</span></div>
      </div>
      <form class="coming-soon-form">
        <input type="email" class="form-control" placeholder="Enter your email address">
        <button type="submit" class="btn btn-primary">Notify Me</button>
      </form>
    </div>
  </section>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/main.js"></script>
</body>
</html>
