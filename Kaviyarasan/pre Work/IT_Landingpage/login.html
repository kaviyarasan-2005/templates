  <section class="auth-section">
    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="logo"><div class="logo-icon"><i class="fas fa-headset"></i></div> TechAssist</a>
        <h2 style="font-size:1.5rem;margin-bottom:.5rem">Welcome Back</h2>
        <p>Sign in to your account to continue</p>
      </div>
      <div class="auth-social">
        <button class="auth-social-btn"><i class="fab fa-google"></i> Google</button>
        <button class="auth-social-btn"><i class="fab fa-microsoft"></i> Microsoft</button>
      </div>
      <div class="auth-divider">or continue with email</div>
      <form>
        <div class="form-group"><label>Email Address</label><input type="email" class="form-control" placeholder="you@company.com"></div>
        <div class="form-group"><label>Password</label><input type="password" class="form-control" placeholder="Enter your password"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
          <label class="form-check" style="margin:0"><input type="checkbox"> Remember me</label>
          <a href="#" style="font-size:.875rem;color:var(--primary);font-weight:500">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">Sign In</button>
      </form>
      <div class="auth-footer">Don't have an account? <a href="register.html">Sign Up</a></div>
    </div>
  </section>
