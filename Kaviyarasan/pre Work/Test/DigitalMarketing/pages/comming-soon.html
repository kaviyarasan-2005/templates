<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - DigiBoost</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--spacing-lg);
            max-width: 600px;
            margin: var(--spacing-xl) auto;
        }
        .countdown-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            text-align: center;
        }
        .countdown-value {
            font-size: 3rem;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }
        .countdown-label {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: var(--spacing-xs);
        }
    </style>
</head>
<body>
    <div class="coming-soon-page">
        <div class="error-content" style="max-width: 700px;">
            <div style="font-size: 4rem; margin-bottom: var(--spacing-md);">🚀</div>
            <h1 style="font-size: 3.5rem; margin-bottom: var(--spacing-md);">Something <span class="gradient-text">Amazing</span> is Coming</h1>
            <p style="font-size: 1.25rem; color: var(--text-secondary); margin-bottom: var(--spacing-xl);">
                We're working hard to bring you an incredible new experience. Stay tuned!
            </p>

            <div class="countdown">
                <div class="countdown-item">
                    <div class="countdown-value" id="days">00</div>
                    <div class="countdown-label">Days</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="hours">00</div>
                    <div class="countdown-label">Hours</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="minutes">00</div>
                    <div class="countdown-label">Minutes</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="seconds">00</div>
                    <div class="countdown-label">Seconds</div>
                </div>
            </div>

            <div class="card" style="max-width: 500px; margin: var(--spacing-2xl) auto; padding: var(--spacing-xl);">
                <h3 style="text-align: center; margin-bottom: var(--spacing-lg);">Get Notified</h3>
                <form style="display: flex; gap: var(--spacing-sm);">
                    <input type="email" class="form-input" placeholder="Enter your email" style="flex: 1;">
                    <button type="submit" class="btn btn-primary">Notify Me</button>
                </form>
                <p style="text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-top: var(--spacing-sm);">
                    We'll send you an email when we launch
                </p>
            </div>

            <div style="margin-top: var(--spacing-2xl);">
                <a href="index.html" class="btn btn-outline btn-lg">← Back to Home</a>
            </div>
        </div>
    </div>
   <script src="../js/main.js"></script>
    <script src="../js/rtl.js"></script>
    <script>
        // Countdown Timer
        const launchDate = new Date('2024-12-31T00:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days.toString().padStart(2, '0');
            document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
            document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(countdownInterval);
                document.querySelector('.countdown').innerHTML = '<h2>We\'re Live!</h2>';
            }
        }

        updateCountdown();
        const countdownInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
