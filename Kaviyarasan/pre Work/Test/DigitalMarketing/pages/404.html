<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found - DigiBoost</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="error-page">
        <div class="error-content" style="max-width: 600px;">
            <h1 style="font-size: 8rem; line-height: 1; margin-bottom: var(--spacing-md);">404</h1>
            <h2 style="margin-bottom: var(--spacing-md);">Page Not Found</h2>
            <p style="font-size: 1.125rem; color: var(--text-secondary); margin-bottom: var(--spacing-xl);">
                Oops! The page you're looking for doesn't exist. It might have been moved or deleted.
            </p>
            <div style="display: flex; gap: var(--spacing-md); justify-content: center; flex-wrap: wrap;">
                <a href="index.html" class="btn btn-primary btn-lg">Go to Homepage</a>
                <a href="contact.html" class="btn btn-secondary btn-lg">Contact Support</a>
            </div>
            
            <div style="margin-top: var(--spacing-2xl); padding-top: var(--spacing-2xl); border-top: 1px solid var(--border-color);">
                <h3 style="margin-bottom: var(--spacing-md);">Quick Links</h3>
                <div style="display: flex; gap: var(--spacing-lg); justify-content: center; flex-wrap: wrap;">
                    <a href="about.html" style="color: var(--text-secondary);">About Us</a>
                    <a href="services.html" style="color: var(--text-secondary);">Services</a>
                    <a href="pricing.html" style="color: var(--text-secondary);">Pricing</a>
                    <a href="case-studies.html" style="color: var(--text-secondary);">Case Studies</a>
                </div>
            </div>
        </div>
    </div>
   <script src="../js/main.js"></script>
    <script src="../js/rtl.js"></script>
</body>
</html>
