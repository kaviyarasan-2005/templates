<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - CloudVault</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="error-page">
        <div class="container-sm" style="max-width: 500px;">

            <div class="logo" style="text-align: center; margin-bottom: var(--spacing-xl); font-size: 2rem;">
                CLOUDVAULT
            </div>

            <div class="card" style="padding: var(--spacing-2xl);">
                <h2 style="text-align: center; margin-bottom: var(--spacing-xl);">
                    CREATE ACCOUNT
                </h2>

                <form>
                    <div class="form-group">
                        <label class="form-label">NAME</label>
                        <input type="text" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">EMAIL</label>
                        <input type="email" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">PASSWORD</label>
                        <input type="password" class="form-input" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        CREATE ACCOUNT
                    </button>
                </form>

                <p style="text-align: center; margin-top: var(--spacing-lg);">
                    Have an account? 
                    <a href="login.html">Login</a>
                </p>

            </div>
        </div>
    </div>

    <script src="main.js"></script>

</body>
</html>
