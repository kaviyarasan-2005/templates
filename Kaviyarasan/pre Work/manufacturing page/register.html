<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FORXA Manufacturing</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%230A2647'/><text x='50' y='68' font-size='55' font-weight='900' text-anchor='middle' fill='%23E8630A'>F</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  
</head>
<body>
<body>
  <section class="auth-section">
    <div class="auth-card">
             <a href="index.html" class="sidebar-logo">
          <div class="sidebar-logo-icon">F</div>
          <div class="sidebar-logo-text">
            FORXA
          </div>
        </a>
    
      <h2>Create Account</h2>
      <p class="subtitle">Join FORXA to manage your manufacturing projects and track orders online.</p>
      <div class="social-btns">
        <button class="social-btn"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn"><i class="fab fa-microsoft"></i> Microsoft</button>
      </div>
      <div class="divider">or register with email</div>
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" placeholder="John"></div>
        <div class="form-group"><label>Last Name</label><input type="text" placeholder="Doe"></div>
      </div>
      <div class="form-group"><label>Company Name</label><input type="text" placeholder="Your Company Inc."></div>
      <div class="form-group"><label>Email Address</label><input type="email" placeholder="you@company.com"></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="Min. 8 characters"></div>
      <div class="form-check" style="margin-bottom:24px;"><input type="checkbox" id="terms"><label for="terms">I agree to the <a href="#" style="color:var(--secondary);">Terms of Service</a> and <a href="#" style="color:var(--secondary);">Privacy Policy</a></label></div>
      <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">Create Account</button>
      <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </section>
  <script src="assets/js/rtl-toggle.js"></script>
</body></html>
