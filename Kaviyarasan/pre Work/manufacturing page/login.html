<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FORXA Manufacturing</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%230A2647'/><text x='50' y='68' font-size='55' font-weight='900' text-anchor='middle' fill='%23E8630A'>F</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  
</head>
<body>
<body>
  <section class="auth-section">
    <div class="auth-card">
            <a href="index.html" class="sidebar-logo">
          <div class="sidebar-logo-icon">F</div>
          <div class="sidebar-logo-text">
            FORXA
          </div>
        </a>
    
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to access your manufacturing dashboard and project tracking.</p>
      <div class="social-btns">
        <button class="social-btn"><i class="fab fa-google"></i> Google</button>
        <button class="social-btn"><i class="fab fa-microsoft"></i> Microsoft</button>
      </div>
      <div class="divider">or sign in with email</div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••">
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
        <div class="form-check"><input type="checkbox" id="remember"><label for="remember">Remember me</label></div>
        <a href="#" style="color:var(--secondary);font-size:.88rem;font-weight:500;">Forgot password?</a>
      </div>
      <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">Sign In</button>
      <p class="auth-footer">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
  </section>
  <script src="assets/js/rtl-toggle.js"></script>
</body></html>
