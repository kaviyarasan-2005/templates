<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Gallery | Coming Soon</title>
  
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <style>
    body {
      background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1577083165350-1418cb2ebaf8?auto=format&fit=crop&q=80&w=1920');
      background-size: cover;
      background-position: center;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .auth-controls {
      position: absolute;
      top: var(--spacing-4);
      right: var(--spacing-4);
      display: flex;
      gap: var(--spacing-2);
      z-index: 10;
    }
    .auth-controls .toggle-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
    }
    .auth-controls .toggle-btn:hover { background: rgba(255,255,255,0.2); }
    
    html[dir="rtl"] .auth-controls { left: var(--spacing-4); right: auto; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-8) 0;
      text-align: center;
    }
    
    .coming-soon-card {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: var(--spacing-8);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 100%;
      max-width: 600px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-2);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 2.5rem;
      color: #fff;
      margin-bottom: var(--spacing-6);
      text-decoration: none;
    }
    .brand-logo i { color: var(--accent-primary); }

    /* Countdown Timer */
    .timer-container {
      display: flex;
      justify-content: center;
      gap: var(--spacing-4);
      margin-bottom: var(--spacing-8);
      flex-wrap: wrap;
    }
    .timer-box {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 1rem;
      min-width: 90px;
    }
    .timer-val {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent-primary);
      line-height: 1;
    }
    .timer-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
      margin-top: 4px;
    }

    /* Newsletter */
    .newsletter-form {
      display: flex;
      gap: 8px;
      margin-bottom: var(--spacing-6);
    }
    .newsletter-form input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-family: var(--font-body);
    }
    .newsletter-form input::placeholder { color: rgba(255,255,255,0.5); }

    /* Social Links */
    .social-links {
      display: flex;
      justify-content: center;
      gap: var(--spacing-3);
      margin-bottom: var(--spacing-4);
    }
    .social-link-white {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: background 0.3s ease;
    }
    .social-link-white:hover {
      background: var(--accent-primary);
      color: #000;
    }
  </style>
</head>
<body>

  <div class="auth-controls">
    <button class="toggle-btn rtl-toggle" aria-label="Toggle RTL/LTR">
      <i class="fa-solid fa-globe"></i>
    </button>
    <button class="toggle-btn theme-toggle" aria-label="Toggle Dark/Light Mode">
      <i class="fa-regular fa-moon"></i>
    </button>
  </div>

  <main>
    <div class="container fade-up">
      <div class="coming-soon-card mx-auto">
        <!-- Brand Logo -->
        <a href="index.html" class="brand-logo">
          <i class="fa-solid fa-palette"></i>
          <span>Lumina</span>
        </a>

        <!-- Headline -->
        <h1 style="font-size: 2rem; margin-bottom: var(--spacing-2);">A New Collection Is Preparing</h1>
        <p style="color: #ccc; margin-bottom: var(--spacing-6);">We are currently curating "The Epoch of Light". The gallery will reopen its doors soon.</p>

        <!-- Countdown Timer -->
        <div class="timer-container" id="countdown">
          <div class="timer-box">
            <div class="timer-val" id="days">00</div>
            <div class="timer-label">Days</div>
          </div>
          <div class="timer-box">
            <div class="timer-val" id="hours">00</div>
            <div class="timer-label">Hours</div>
          </div>
          <div class="timer-box">
            <div class="timer-val" id="minutes">00</div>
            <div class="timer-label">Mins</div>
          </div>
          <div class="timer-box">
            <div class="timer-val" id="seconds">00</div>
            <div class="timer-label">Secs</div>
          </div>
        </div>

        <!-- Newsletter Capture -->
        <form class="newsletter-form">
          <input type="email" placeholder="Enter your email to be notified..." required>
          <button type="submit" class="btn" style="background: var(--accent-primary); color: #000; border: none;">Notify Me</button>
        </form>

        <!-- Social Links & Email -->
        <div class="social-links">
          <a href="#" class="social-link-white"><i class="fa-brands fa-instagram"></i></a>
          <a href="#" class="social-link-white"><i class="fa-brands fa-twitter"></i></a>
          <a href="#" class="social-link-white"><i class="fa-brands fa-linkedin-in"></i></a>
        </div>
        <div style="font-size: 0.875rem;">
          <span style="opacity: 0.7;">General Inquiries: </span>
          <a href="mailto:hello@luminagallery.com" style="color: var(--accent-primary); font-weight: 500;">hello@luminagallery.com</a>
        </div>

      </div>
    </div>
  </main>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/animations.js"></script>
  <script>
    // Countdown Timer Logic
    document.addEventListener('DOMContentLoaded', () => {
      // Set to 30 days from now for demo
      const countDownDate = new Date(new Date().getTime() + 30 * 24 * 60 * 60 * 1000).getTime();

      const timer = setInterval(() => {
        const now = new Date().getTime();
        const distance = countDownDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
        document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
        document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
        document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;

        if (distance < 0) {
          clearInterval(timer);
          document.getElementById("countdown").innerHTML = "<div style='font-size: 1.5rem; color: var(--accent-primary); font-weight: 700; width: 100%;'>The Exhibition is Now Open</div>";
        }
      }, 1000);
    });
  </script>
</body>
</html>
