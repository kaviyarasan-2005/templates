<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Gallery | Sign In</title>
  
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <style>
    /* Strict Constraints */
    body, html {
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden; /* NO vertical scrollbar */
      background-color: var(--bg-primary);
    }
    
    /* Top Right Controls */
    .auth-controls {
      position: absolute;
      top: var(--spacing-4);
      right: var(--spacing-4);
      display: flex;
      gap: var(--spacing-2);
      z-index: 10;
    }
    .auth-controls .toggle-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 8px var(--shadow-color);
    }

    /* Split Layout */
    .auth-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100%;
    }

    /* Left side - Image */
    .auth-image {
      background-image: url('https://images.unsplash.com/photo-1577083552431-6e5fd01aa342?auto=format&fit=crop&q=80&w=1920');
      background-size: cover;
      background-position: center;
      position: relative;
    }
    .auth-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.5));
    }

    /* Right side - Form Card */
    .auth-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-8);
      background-color: var(--bg-primary);
      height: 100%;
      overflow-y: auto; /* Just in case height exceeds on very small screens, though it shouldn't on standard */
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      padding: var(--spacing-8);
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 12px 24px var(--shadow-color);
      text-align: center;
    }

    /* Centered Brand inside card */
    .auth-brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-2);
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 2rem;
      color: var(--text-primary);
      margin-bottom: var(--spacing-6);
      text-decoration: none;
    }
    .auth-brand i { color: var(--accent-primary); font-size: 2.25rem; }

    /* Form Fields */
    .input-group {
      margin-bottom: var(--spacing-4);
      text-align: left;
      position: relative;
    }
    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.875rem;
    }
    .input-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      transition: border-color 0.3s ease;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
    }
    
    .input-error {
      color: #e53e3e;
      font-size: 0.75rem;
      position: absolute;
      bottom: -18px;
      left: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .input-group.invalid input { border-color: #e53e3e; }
    .input-group.invalid .input-error { opacity: 1; }

    .submit-btn {
      width: 100%;
      margin-top: var(--spacing-2);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--text-muted);
      margin: var(--spacing-6) 0;
      font-size: 0.875rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }
    .auth-divider::before { margin-right: 1rem; }
    .auth-divider::after { margin-left: 1rem; }

    .social-logins {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-3);
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 0.75rem;
      border-radius: 4px;
      font-family: var(--font-body);
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .social-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--shadow-color);
    }
    /* Branded Colors */
    .btn-google { background-color: #ffffff; color: #757575; border: 1px solid #ddd; }
    .btn-google:hover { background-color: #f5f5f5; border-color: #ccc; }
    .btn-apple { background-color: #000000; color: #ffffff; border: 1px solid #000; }
    .btn-apple:hover { background-color: #333; }

    /* For Dark Mode consistency on Google Button */
    html.dark-theme .btn-google { background-color: #2a2a2a; color: #e0e0e0; border-color: #444; }
    html.dark-theme .btn-google:hover { background-color: #333; }
    html.dark-theme .btn-apple { background-color: #ffffff; color: #000000; }
    html.dark-theme .btn-apple:hover { background-color: #e0e0e0; }

    /* RTL specific fixed positions */
    html[dir="rtl"] .auth-controls { left: var(--spacing-4); right: auto; }

    @media (max-width: 768px) {
      .auth-wrapper { grid-template-columns: 1fr; }
      .auth-image { display: none; }
    }
  </style>
</head>
<body>

  <div class="auth-controls">
    <button class="toggle-btn rtl-toggle" aria-label="Toggle RTL/LTR">
      <i class="fa-solid fa-globe"></i>
    </button>
    <button class="toggle-btn theme-toggle" aria-label="Toggle Dark/Light Mode">
      <i class="fa-regular fa-moon"></i>
    </button>
  </div>

  <div class="auth-wrapper">
    <div class="auth-image"></div>
    <div class="auth-panel">
      <div class="auth-card">
        <!-- Centered Logo acting as Return to Home -->
        <a href="index.html" class="auth-brand">
          <i class="fa-solid fa-palette"></i>
          <span>Lumina</span>
        </a>
        
        <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Welcome Back</h2>
        <p class="text-secondary text-sm mb-6">Enter your credentials to access your portal</p>

        <form id="loginForm" novalidate>
          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="collector@example.com" required>
            <span class="input-error">Please provide a valid email format.</span>
          </div>

          <div class="input-group" style="margin-bottom: var(--spacing-6);">
            <label for="password" style="display: flex; justify-content: space-between;">
              Password
              <a href="#" class="text-accent" style="color: var(--accent-primary); font-size: 0.75rem; text-decoration: none;">Forgot?</a>
            </label>
            <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6">
            <span class="input-error">Password must be at least 6 characters.</span>
          </div>

          <button type="submit" class="btn btn-primary submit-btn">Sign In</button>
        </form>

        <div class="auth-divider">OR</div>

        <div class="social-logins">
          <a href="#" class="social-btn btn-google">
            <i class="fa-brands fa-google text-lg"></i> Continue with Google
          </a>
          <a href="#" class="social-btn btn-apple">
            <i class="fa-brands fa-apple text-lg"></i> Continue with Apple
          </a>
        </div>

        <p class="text-sm mt-6 text-secondary">
          Don't have an account? <a href="register.html" style="color: var(--accent-primary); font-weight: 600;">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');
      if (form) {
        // Real-time validation
        const inputs = form.querySelectorAll('input');
        
        inputs.forEach(input => {
          input.addEventListener('input', () => {
            if (input.checkValidity()) {
              input.parentElement.classList.remove('invalid');
            } else {
              // Detailed check based on type
              if (input.type === 'email' && input.value !== '') {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if(emailRegex.test(input.value)) {
                   input.parentElement.classList.remove('invalid');
                } else {
                   input.parentElement.classList.add('invalid');
                }
              }
            }
          });
        });

        form.addEventListener('submit', (e) => {
          e.preventDefault();
          let isValid = true;
          
          inputs.forEach(input => {
            const group = input.parentElement;
            if (!input.checkValidity()) {
              group.classList.add('invalid');
              isValid = false;
            }
            if (input.type === 'email' && input.value !== '') {
              const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
              if (!emailRegex.test(input.value)) {
                group.classList.add('invalid');
                isValid = false;
              }
            }
          });

          if (isValid) {
            // Redirect to User Dashboard upon successful validation
            window.location.href = 'user-dashboard.html';
          }
        });
      }
    });
  </script>
</body>
</html>
