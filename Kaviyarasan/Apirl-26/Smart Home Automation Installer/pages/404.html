<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — SmartNest</title>
  <meta name="description" content="The page you're looking for doesn't exist. Navigate back to SmartNest's homepage or contact us for help." />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <style>
    .error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:var(--space-4);background:var(--bg-body);}
    .error-page__code{font-family:var(--font-heading);font-size:8rem;font-weight:var(--fw-bold);background:linear-gradient(135deg,var(--color-primary),var(--color-accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
    .error-illustration{max-width:320px;margin:var(--space-3) auto;}
    .error-illustration svg{width:100%;height:auto;}
    @media(max-width:640px){.error-page__code{font-size:5rem;}}
  </style>
</head>
<body>
  <div class="error-page">
    <div style="max-width:540px;">
      <div class="error-page__code">404</div>
      <div class="error-illustration">
        <svg viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="120" y="40" width="160" height="120" rx="12" stroke="var(--color-primary)" stroke-width="2" fill="none" opacity="0.2"/>
          <rect x="140" y="60" width="120" height="20" rx="4" fill="var(--color-primary)" opacity="0.15"/>
          <rect x="140" y="90" width="80" height="12" rx="3" fill="var(--border-color)"/>
          <rect x="140" y="110" width="100" height="12" rx="3" fill="var(--border-color)"/>
          <rect x="140" y="130" width="60" height="12" rx="3" fill="var(--border-color)"/>
          <circle cx="80" cy="100" r="30" stroke="var(--color-accent)" stroke-width="2" fill="none" opacity="0.3"/>
          <path d="M70 100 L90 100 M80 90 L80 110" stroke="var(--color-accent)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
          <circle cx="340" cy="70" r="20" stroke="var(--color-primary)" stroke-width="2" fill="none" opacity="0.2"/>
          <circle cx="320" cy="150" r="15" stroke="var(--color-accent)" stroke-width="1.5" fill="none" opacity="0.2"/>
          <path d="M50 170 Q200 150 350 170" stroke="var(--border-color)" stroke-width="1" fill="none"/>
        </svg>
      </div>
      <h1 style="font-size:var(--fs-3xl);margin-bottom:var(--space-1);">Page Not Found</h1>
      <p style="color:var(--text-secondary);margin-bottom:var(--space-4);max-width:400px;margin-left:auto;margin-right:auto;">The page you're looking for seems to have vanished into the smart home void. It might have been moved, renamed, or never existed.</p>
      <div style="display:flex;gap:var(--space-2);justify-content:center;flex-wrap:wrap;">
        <a href="index.html" class="btn btn-primary btn-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Back to Home
        </a>
        <a href="contact.html" class="btn btn-outline btn-lg">Contact Support</a>
      </div>
    </div>
  </div>
</body>
</html>
