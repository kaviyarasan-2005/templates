<!DOCTYPE html>
<html lang="en" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — SmartNest</title>
  <meta name="description" content="Something exciting is coming from SmartNest. Sign up to be the first to know when we launch." />
  <link rel="icon" type="image/svg+xml" href="../assets/images/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link rel="stylesheet" href="../assets/css/rtl.css" />
  <style>
    :root {
      /* Dark Theme (Default/Initial) */
      --cs-bg: linear-gradient(135deg, #0F172A 0%, #1E3A8A 50%, #0891B2 100%);
      --cs-text-main: #FFFFFF;
      --cs-text-muted: rgba(255, 255, 255, 0.6);
      --cs-card-bg: rgba(255, 255, 255, 0.05);
      --cs-card-border: rgba(255, 255, 255, 0.1);
      --cs-input-bg: rgba(0, 0, 0, 0.2);
      --cs-glow: rgba(56, 189, 248, 0.15);
      --cs-acc: var(--color-accent);
    }

    [data-theme="light"] {
      /* Light Theme (Drastic Change) */
      --cs-bg: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 50%, #BAE6FD 100%);
      --cs-text-main: #0F172A;
      --cs-text-muted: #475569;
      --cs-card-bg: rgba(255, 255, 255, 0.7);
      --cs-card-border: rgba(30, 64, 175, 0.1);
      --cs-input-bg: #FFFFFF;
      --cs-glow: rgba(37, 99, 235, 0.08);
      --cs-acc: var(--color-primary);
    }

    /* Page Header */
    .page-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-4) var(--space-6);
      z-index: 10;
      transition: background var(--transition-base);
    }

    .page-header .navbar__logo {
      font-size: var(--fs-xl);
      text-decoration: none;
      color: var(--cs-text-main);
      transition: color var(--transition-base);
    }

    .page-actions {
      display: flex;
      gap: var(--space-1);
    }

    .page-actions .navbar__icon-btn {
      background: var(--cs-card-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--cs-card-border);
      border-radius: var(--border-radius);
      color: var(--cs-text-main);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .page-actions .navbar__icon-btn:hover {
      background: var(--color-primary);
      color: #fff;
      transform: translateY(-2px);
    }

    .coming-soon {
      padding: var(--space-16) var(--space-4) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: var(--cs-bg);
      color: var(--cs-text-main);
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      transition: background var(--transition-base), color var(--transition-base);
    }

    .coming-soon::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: var(--cs-glow);
      top: -200px;
      right: -100px;
      transition: background var(--transition-base);
    }

    .coming-soon::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: var(--cs-glow);
      bottom: -150px;
      left: -100px;
      transition: background var(--transition-base);
    }

    .coming-soon__inner {
      position: relative;
      z-index: 1;
      max-width: 600px;
    }

    .countdown-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-2);
      margin: var(--space-4) 0;
    }

    .countdown-item {
      background: var(--cs-card-bg);
      border: 1px solid var(--cs-card-border);
      border-radius: var(--border-radius-lg);
      padding: var(--space-2) var(--space-1);
      box-shadow: var(--shadow-sm);
      transition: all var(--transition-base);
    }

    .countdown-item__number {
      font-family: var(--font-heading);
      font-size: var(--fs-5xl);
      font-weight: var(--fw-bold);
      color: var(--cs-text-main);
      line-height: 1;
      transition: color var(--transition-base);
    }

    .countdown-item__label {
      font-size: var(--fs-xs);
      color: var(--cs-text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
      transition: color var(--transition-base);
    }

    .coming-social {
      display: flex;
      gap: var(--space-1);
      justify-content: center;
      margin-top: var(--space-3);
    }

    .coming-social a {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--cs-card-bg);
      border: 1px solid var(--cs-card-border);
      color: var(--cs-text-main);
      transition: all var(--transition-base);
    }

    .coming-social a:hover {
      background: var(--color-primary);
      color: #fff;
      transform: translateY(-2px);
    }

    form[data-validate] .form-input {
      background: var(--cs-input-bg);
      border: 1px solid var(--cs-card-border);
      color: var(--cs-text-main);
      transition: all var(--transition-base);
    }

    form[data-validate] .form-input::placeholder {
      color: var(--cs-text-muted);
    }

    .coming-soon__inner h1 {
      font-size: var(--fs-5xl);
      margin-bottom: var(--space-2);
      color: var(--cs-text-main);
      transition: color var(--transition-base);
    }

    .coming-soon__inner p {
      color: var(--cs-text-muted);
      font-size: var(--fs-lg);
      max-width: 480px;
      margin: 0 auto var(--space-4);
      transition: color var(--transition-base);
    }

    .coming-soon__inner .lead-text {
      font-size: var(--fs-sm);
      color: var(--cs-text-muted);
      margin-bottom: var(--space-2);
      transition: color var(--transition-base);
    }

    form[data-validate] {
      display: flex;
      gap: var(--space-1);
      max-width: 420px;
      margin: 0 auto;
    }

    @media(max-width:480px) {
      .countdown-item__number { font-size: var(--fs-3xl); }
      .countdown-grid { gap: var(--space-1); }
      .coming-soon__inner h1 { font-size: var(--fs-3xl); }
    }
    @media(max-width:400px) {
      .page-header { padding: var(--space-2) var(--space-2); }
      .coming-soon__inner h1 { font-size: var(--fs-2xl); }
      .coming-soon__inner p { font-size: var(--fs-base); }
      .countdown-grid { grid-template-columns: repeat(2, 1fr); }
      .countdown-item__number { font-size: var(--fs-2xl); }
      form[data-validate] { flex-direction: column; }
      form[data-validate] input, form[data-validate] button { width: 100%; }
      .coming-soon { padding: var(--space-12) var(--space-2) var(--space-4); }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="index.html" class="navbar__logo" aria-label="SmartNest Home" id="cs-logo">
      <img src="../assets/images/logo.svg" alt="SmartNest Logo" width="36" height="36" id="cs-logo-img" />
      Smart<span>Nest</span>
    </a>

    <div class="page-actions">
      <button class="navbar__icon-btn" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="theme-icon"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button class="navbar__icon-btn" id="rtl-toggle" aria-label="Toggle RTL layout" title="Toggle RTL/LTR">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </button>
    </div>
  </header>

  <div class="coming-soon">
    <div class="coming-soon__inner">
      <h1>Something <span style="color:var(--cs-acc);">Amazing</span> Is Coming</h1>
      <p>We're building the next generation of smart home automation. Be the first to experience it.</p>

      <div id="countdown" class="countdown-grid">
        <div class="countdown-item">
          <div class="countdown-item__number" data-days>00</div>
          <div class="countdown-item__label">Days</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-item__number" data-hours>00</div>
          <div class="countdown-item__label">Hours</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-item__number" data-minutes>00</div>
          <div class="countdown-item__label">Minutes</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-item__number" data-seconds>00</div>
          <div class="countdown-item__label">Seconds</div>
        </div>
      </div>

      <p class="lead-text">Get notified when we launch:</p>
      <form data-validate novalidate>
        <input type="email" class="form-input" placeholder="Enter your email address" required />
        <button type="submit" class="btn btn-accent">Notify Me</button>
      </form>

      <div class="coming-social">
        <a href="#" aria-label="Facebook"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
        <a href="#" aria-label="LinkedIn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></a>
      </div>
    </div>
  </div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="../assets/js/main.js"></script>
</body>
</html>
