<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — SmartNest</title>
  <meta name="description" content="Something exciting is coming from SmartNest. Sign up to be the first to know when we launch." />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <style>
    .coming-soon{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:var(--space-4);background:linear-gradient(135deg,#0F172A 0%,#1E3A8A 50%,#0C4A6E 100%);color:#fff;position:relative;overflow:hidden;}
    .coming-soon::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(56,189,248,0.08);top:-200px;right:-100px;}
    .coming-soon::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(37,99,235,0.06);bottom:-150px;left:-100px;}
    .coming-soon__inner{position:relative;z-index:1;max-width:600px;}
    .countdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-2);margin:var(--space-4) 0;}
    .countdown-item{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:var(--border-radius-lg);padding:var(--space-2) var(--space-1);}
    .countdown-item__number{font-family:var(--font-heading);font-size:var(--fs-5xl);font-weight:var(--fw-bold);color:#fff;line-height:1;}
    .countdown-item__label{font-size:var(--fs-xs);color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
    .coming-social{display:flex;gap:var(--space-1);justify-content:center;margin-top:var(--space-3);}
    .coming-social a{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);transition:all var(--transition-base);}
    .coming-social a:hover{background:var(--color-primary);color:#fff;transform:translateY(-2px);}
    .coming-social a svg{width:20px;height:20px;}
    @media(max-width:480px){.countdown-item__number{font-size:var(--fs-3xl);}.countdown-grid{gap:var(--space-1);}}
  </style>
</head>
<body>
  <div class="coming-soon">
    <div class="coming-soon__inner">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:8px;color:#fff;font-family:var(--font-heading);font-size:var(--fs-xl);font-weight:var(--fw-bold);margin-bottom:var(--space-4);text-decoration:none;">
        <img src="../assets/images/logo-white.svg" alt="SmartNest" width="36" height="36" />
        Smart<span style="color:var(--color-accent);">Nest</span>
      </a>

      <h1 style="font-size:var(--fs-5xl);margin-bottom:var(--space-2);">Something <span style="color:var(--color-accent);">Amazing</span> Is Coming</h1>
      <p style="color:rgba(255,255,255,0.75);font-size:var(--fs-lg);max-width:480px;margin:0 auto;">We're building the next generation of smart home automation. Be the first to experience it.</p>

      <div id="countdown" class="countdown-grid">
        <div class="countdown-item">
          <div class="countdown-item__number" data-days>00</div>
          <div class="countdown-item__label">Days</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-item__number" data-hours>00</div>
          <div class="countdown-item__label">Hours</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-item__number" data-minutes>00</div>
          <div class="countdown-item__label">Minutes</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-item__number" data-seconds>00</div>
          <div class="countdown-item__label">Seconds</div>
        </div>
      </div>

      <p style="font-size:var(--fs-sm);color:rgba(255,255,255,0.6);margin-bottom:var(--space-2);">Get notified when we launch:</p>
      <form data-validate novalidate style="display:flex;gap:var(--space-1);max-width:420px;margin:0 auto;">
        <input type="email" class="form-input" placeholder="Enter your email address" required style="flex:1;background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);color:#fff;" />
        <button type="submit" class="btn btn-accent">Notify Me</button>
      </form>

      <div class="coming-social">
        <a href="#" aria-label="Facebook"><svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
        <a href="#" aria-label="Twitter/X"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4l16 16M20 4L4 20"/></svg></a>
        <a href="#" aria-label="Instagram"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></a>
        <a href="#" aria-label="LinkedIn"><svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg></a>
      </div>

      <p style="margin-top:var(--space-4);font-size:var(--fs-xs);color:rgba(255,255,255,0.4);">© 2024 SmartNest. All rights reserved. <a href="index.html" style="color:rgba(255,255,255,0.5);">Return to Home</a></p>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
