<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Maintenance | Aura</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; font-family: 'Inter', sans-serif;
      background: #0F172A; color: white; overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(13,115,119,0.3) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 70%, rgba(212,175,55,0.15) 0%, transparent 45%);
    }
    .page {
      position: relative; z-index: 1;
      height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 24px;
    }
    .logo {
      font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700;
      color: #14B8BE; display: flex; align-items: center; gap: 10px; margin-bottom: 48px;
    }
    .wrench-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(13,115,119,0.2); border: 1px solid rgba(20,184,190,0.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px; animation: spin-slow 8s linear infinite;
    }
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    h1 {
      font-family: 'Playfair Display', serif; font-size: clamp(1.75rem, 5vw, 3rem);
      font-weight: 700; margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 30%, #14B8BE 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle {
      color: rgba(255,255,255,0.6); font-size: 1.0625rem;
      max-width: 480px; line-height: 1.7; margin-bottom: 40px;
    }
    /* Animated progress bar */
    .maint-progress-wrap {
      width: 320px; max-width: 90vw;
      background: rgba(255,255,255,0.08); border-radius: 20px; height: 8px;
      overflow: hidden; margin-bottom: 12px;
    }
    .maint-progress-fill {
      height: 100%; border-radius: 20px;
      background: linear-gradient(90deg, #0D7377, #14B8BE, #D4AF37);
      animation: progressAnim 3s ease-in-out infinite alternate;
      background-size: 200% 100%;
    }
    @keyframes progressAnim {
      0% { width: 30%; background-position: 0% 0%; }
      50% { width: 65%; background-position: 50% 0%; }
      100% { width: 88%; background-position: 100% 0%; }
    }
    .progress-label {
      font-size: 0.8125rem; color: rgba(255,255,255,0.4); margin-bottom: 40px;
    }
    .social-row { display: flex; gap: 16px; }
    .soc-link {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center;
      justify-content: center; color: rgba(255,255,255,0.5); transition: all 0.2s;
    }
    .soc-link:hover { border-color: #14B8BE; color: #14B8BE; }
    .contact-note {
      margin-top: 32px; font-size: 0.875rem; color: rgba(255,255,255,0.4);
    }
    .contact-note a { color: #14B8BE; text-decoration: none; }
    .contact-note a:hover { text-decoration: underline; }
    /* Floating particles */
    .particle {
      position: fixed; border-radius: 50%;
      background: rgba(13,115,119,0.3); pointer-events: none;
      animation: floatParticle var(--dur) ease-in-out infinite alternate;
    }
    @keyframes floatParticle {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.2); }
    }
  </style>

  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <script src="assets/js/theme-toggle.js"></script>
</head>
<body>
  <!-- Particles -->
  <div class="particle" style="width:120px;height:120px;top:10%;left:8%;--dur:7s;--tx:30px;--ty:20px;"></div>
  <div class="particle" style="width:60px;height:60px;top:70%;right:12%;--dur:5s;--tx:-20px;--ty:-30px;background:rgba(212,175,55,0.2);"></div>
  <div class="particle" style="width:40px;height:40px;bottom:20%;left:20%;--dur:9s;--tx:15px;--ty:-15px;"></div>

  <div class="bg"></div>

  <div class="page">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#14B8BE" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      Aura
    </div>

    <div class="wrench-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#14B8BE" stroke-width="1.5">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
      </svg>
    </div>

    <h1>We're Upgrading Your Experience</h1>
    <p class="subtitle">Our team is currently performing scheduled maintenance to improve performance and add exciting new features. We'll be back shortly.</p>

    <div class="maint-progress-wrap">
      <div class="maint-progress-fill"></div>
    </div>
    <div class="progress-label">Estimated completion: Sunday, April 13 at 8:00 AM PST</div>

    <div class="social-row">
      <a href="#" class="soc-link" aria-label="Facebook">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
      </a>
      <a href="#" class="soc-link" aria-label="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
      </a>
      <a href="#" class="soc-link" aria-label="LinkedIn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
      </a>
    </div>

    <p class="contact-note">
      Need urgent assistance? Email us at <a href="mailto:hello@auradesign.com">hello@auradesign.com</a>
    </p>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
