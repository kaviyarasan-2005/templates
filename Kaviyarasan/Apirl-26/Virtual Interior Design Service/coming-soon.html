<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Aura</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; font-family: 'Inter', sans-serif;
      background: #0F172A; color: white; overflow: hidden;
    }
    /* Animated gradient background */
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(13,115,119,0.35) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(212,175,55,0.2) 0%, transparent 60%),
                  radial-gradient(ellipse at 60% 80%, rgba(13,115,119,0.2) 0%, transparent 60%);
      animation: bgShift 8s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0% { background-position: 20% 50%, 80% 20%, 60% 80%; }
      100% { background-position: 30% 60%, 70% 30%, 50% 70%; }
    }
    .page {
      position: relative; z-index: 1; height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .logo {
      font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700;
      color: #14B8BE; display: flex; align-items: center; gap: 10px;
      margin-bottom: 48px;
    }
    h1 {
      font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700; margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #14B8BE 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { color: rgba(255,255,255,0.65); font-size: 1.125rem; margin-bottom: 48px; }

    /* Countdown flip cards */
    .countdown { display: flex; gap: 16px; justify-content: center; margin-bottom: 48px; flex-wrap: wrap; }
    .flip-card { text-align: center; }
    .flip-num {
      width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 700; font-family: 'Playfair Display', serif;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; backdrop-filter: blur(10px);
      color: #14B8BE; transition: transform 0.3s;
    }
    .flip-label { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 8px; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Email form */
    .notify-form {
      display: flex; max-width: 420px; width: 100%;
      background: rgba(255,255,255,0.08); border-radius: 50px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px);
    }
    .notify-form input {
      flex: 1; background: transparent; border: none; padding: 0 20px;
      color: white; font-size: 0.9375rem;
    }
    .notify-form input::placeholder { color: rgba(255,255,255,0.4); }
    .notify-form input:focus { outline: none; }
    .notify-form button {
      background: #0D7377; border: none; color: white; padding: 0 24px;
      height: 48px; font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
    }
    .notify-form button:hover { background: #074345; }
    .notify-form-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
    .notify-success { display: none; color: #14B8BE; font-size: 0.875rem; }

    .social-row { display: flex; gap: 16px; margin-top: 32px; }
    .soc-link {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center;
      justify-content: center; color: rgba(255,255,255,0.6); transition: all 0.2s;
    }
    .soc-link:hover { border-color: #14B8BE; color: #14B8BE; }
  </style>

  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <script src="assets/js/theme-toggle.js"></script>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="page">
    <a href="home-1.html" class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#14B8BE" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      Aura
    </a>

    <h1>Something Beautiful <br>Is Coming</h1>
    <p class="subtitle">We're crafting a stunning new experience. <br>Be the first to know when we launch.</p>

    <!-- Countdown Timer -->
    <div class="countdown">
      <div class="flip-card"><div class="flip-num" id="cd-days">00</div><div class="flip-label">Days</div></div>
      <div class="flip-card"><div class="flip-num" id="cd-hours">00</div><div class="flip-label">Hours</div></div>
      <div class="flip-card"><div class="flip-num" id="cd-minutes">00</div><div class="flip-label">Minutes</div></div>
      <div class="flip-card"><div class="flip-num" id="cd-seconds">00</div><div class="flip-label">Seconds</div></div>
    </div>

    <!-- Email notify -->
    <div class="notify-form-wrapper">
      <div class="notify-form">
        <input type="email" id="notifyEmail" placeholder="Enter your email address">
        <button onclick="notifySubmit()">Notify Me</button>
      </div>
      <div id="notifySuccess" class="notify-success">✓ You're on the list! We'll notify you at launch.</div>
    </div>

    <div class="social-row">
      <a href="#" class="soc-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg></a>
      <a href="#" class="soc-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg></a>
      <a href="#" class="soc-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg></a>
    </div>
  </div>

  <script>
    // Countdown to a launch date
    const launchDate = new Date('2026-06-01T00:00:00');
    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;
      if (diff <= 0) { return; }
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
      document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('cd-minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('cd-seconds').textContent = String(seconds).padStart(2, '0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    function notifySubmit() {
      const email = document.getElementById('notifyEmail').value;
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return;
      document.getElementById('notifySuccess').style.display = 'block';
      document.getElementById('notifyEmail').value = '';
    }
  </script>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
