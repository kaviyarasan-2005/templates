<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Renovo account to track your renovation projects and manage your profile.">
  <title>Login | Renovo</title>
  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#E8622A">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/fill/style.css">
  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>

<style>
body{margin:0;padding:0;height:100vh;display:grid;grid-template-columns:1.1fr 0.9fr;overflow:hidden;}
@media(max-width:1024px){body{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){body{grid-template-columns:1fr;height:auto;overflow:auto;}}
.auth-image{background:url("https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=900&q=80") center/cover no-repeat;height:100vh;position:relative;}
.auth-image-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(15,40,64,0.85),rgba(232,98,42,0.25));display:flex;flex-direction:column;justify-content:flex-end;padding:60px;}
.auth-panel{display:flex;flex-direction:column;align-items:center;padding:80px 40px;background:var(--bg-secondary);height:100vh;overflow-y:auto;position:relative;}
.auth-card{width:100%;max-width:420px;margin:auto;}
.auth-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
.auth-logo-icon{width:56px;height:56px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.5rem;margin-bottom:10px;}
.auth-logo-name{font-family:var(--font-heading);font-size:1.5rem;font-weight:700;color:var(--secondary);}
.auth-logo-name span{color:var(--primary);}
.auth-divider{display:flex;align-items:center;gap:12px;margin:24px 0;}
.auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:var(--border-color);}
.auth-divider span{font-size:0.8rem;color:var(--text-muted);white-space:nowrap;}
.social-login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border:1.5px solid var(--border-color);border-radius:8px;font-size:0.875rem;font-weight:600;color:var(--text-primary);background:var(--bg-secondary);cursor:pointer;transition:all 0.3s;margin-bottom:10px;}
.social-login-btn:hover{border-color:var(--primary);background:rgba(232,98,42,0.05);}
.auth-toggles{position:fixed;top:24px;right:24px;display:flex;gap:10px;z-index:100;}
@media(max-width:768px){.auth-image{display:none;}.auth-panel{padding:60px 24px;}.auth-toggles{position:absolute;top:16px;right:16px;}}
</style>

<body>
<div class="auth-image" role="img" aria-label="Beautifully renovated modern home">
  <div class="auth-image-overlay">
    <blockquote style="color:#fff;font-size:1.5rem;font-family:var(--font-heading);font-style:italic;margin-bottom:16px;line-height:1.5;">"They turned our outdated house into our dream home."</blockquote>
    <p style="color:rgba(255,255,255,0.7);font-size:0.9rem;">— Sarah Mitchell, Beverly Hills</p>
    <div style="display:flex;gap:4px;margin-top:12px;"><i class="ph-fill ph-star" style="color:var(--accent);"></i><i class="ph-fill ph-star" style="color:var(--accent);"></i><i class="ph-fill ph-star" style="color:var(--accent);"></i><i class="ph-fill ph-star" style="color:var(--accent);"></i><i class="ph-fill ph-star" style="color:var(--accent);"></i></div>
  </div>
</div>

<div class="auth-panel">
  <div class="auth-card">
    <!-- Logo links to home -->
    <a href="index.html" class="auth-logo" aria-label="Renovo - Return to home">
      <div class="auth-logo-icon"><img src="assets/images/favicons/favicon.svg" alt="Renovo Logo" style="width:100%;height:100%;object-fit:contain;"></div>
      <span class="auth-logo-name">Renovo</span>
    </a>

    <h1 style="font-size:1.6rem;text-align:center;margin-bottom:6px;">Welcome Back</h1>
    <p style="text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:24px;">Sign in to track your projects</p>

    <!-- Social Login -->
    <button class="social-login-btn" aria-label="Continue with Google">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58Z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <button class="social-login-btn" aria-label="Continue with Facebook">
      <i class="ph-fill ph-facebook-logo" style="color:#1877F2;font-size:1.1rem;"></i> Continue with Facebook
    </button>
    <button class="social-login-btn" aria-label="Continue with Apple">
      <i class="ph-fill ph-apple-logo" style="color:var(--text-primary);font-size:1.1rem;"></i> Continue with Apple
    </button>

    <div class="auth-divider"><span>or sign in with email</span></div>

    <form data-validate action="#" method="POST" aria-label="Login form">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input type="email" id="login-email" name="email" class="form-control" placeholder="you@example.com" required aria-required="true">
        <p class="form-error" role="alert">Please enter a valid email address.</p>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password" style="display:flex;justify-content:space-between;"><span>Password</span><a href="#" style="font-size:0.8rem;color:var(--primary);">Forgot password?</a></label>
        <input type="password" id="login-password" name="password" class="form-control" placeholder="••••••••" required aria-required="true">
        <p class="form-error" role="alert">Please enter your password.</p>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100" style="margin-bottom:16px;">Sign In <i class="ph ph-sign-in"></i></button>
    </form>
    <p style="text-align:center;font-size:0.9rem;color:var(--text-muted);">Do not have an account? <a href="signup.html" style="color:var(--primary);font-weight:600;">Create one free</a></p>

    <!-- Theme/RTL toggles -->
    <div class="auth-toggles">
      <button class="icon-btn theme-toggle-btn" aria-label="Toggle theme"><i class="ph ph-moon"></i></button>
      <button class="icon-btn rtl-toggle-btn" aria-label="Toggle RTL"><i class="ph ph-globe"></i></button>
    </div>
  </div>
</div>
<script src="assets/js/main.js"></script>
</body>
</html>
