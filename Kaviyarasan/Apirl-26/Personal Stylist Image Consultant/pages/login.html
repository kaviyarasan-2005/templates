<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Élise Laurent</title>
  <meta name="description" content="Sign in to your Élise Laurent account to access your style dashboard, book sessions, and manage your profile."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="icon" href="../assets/images/icons/favicon.svg" type="image/svg+xml"/><link rel="manifest" href="../manifest.json"/><link rel="stylesheet" href="../assets/css/main.css"/><link rel="stylesheet" href="../assets/css/components.css"/>
  <link rel="stylesheet" href="../assets/css/animations.css"/><link rel="stylesheet" href="../assets/css/dark-mode.css"/>
  <link rel="stylesheet" href="../assets/css/rtl.css"/><link rel="stylesheet" href="../assets/css/style.css"/>
</head>
<body>
<main id="main-content">
  <div class="auth-layout" style="background-image: url('../assets/images/auth/login-bg.png')">
    <div class="auth-overlay"></div>
    <div class="auth-card">
      <!-- Form Side -->
      <div class="auth-form-side">
        <div class="auth-header-wrap">
          <a href="index.html" class="auth-logo" aria-label="Return home" style="margin-bottom:0;">
            <img src="../assets/images/icons/logo.svg" alt="Élise Laurent Logo" width="40" height="40" style="flex-shrink:0;"/>
            <div>
              <div style="font-weight:700;font-size:var(--text-base);color:var(--text-primary)">Élise Laurent</div>
              <div style="font-size:var(--text-xs);color:var(--text-muted)">Image Consultant</div>
            </div>
          </a>
          <div class="auth-toggles">
            <button type="button" class="nav-action-btn" data-dir-toggle aria-label="Toggle direction"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></button>
            <button type="button" class="nav-action-btn" data-theme-toggle aria-label="Toggle theme">
              <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
          </div>
        </div>

        <h1 class="auth-heading">Welcome back</h1>
        <p class="auth-subheading">Sign in to your style dashboard and continue your journey.</p>

        <!-- Social Auth -->
        <div class="auth-social-btns">
          <a href="#" class="auth-social-btn" rel="noopener noreferrer" id="google-signin-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </a>
        </div>

        <div class="auth-social-divider">or continue with email</div>

        <form id="login-form" data-validate-form novalidate aria-label="Sign in form">
          <div class="form-group">
            <label class="form-label" for="login-email">Email Address</label>
            <input type="email" id="login-email" name="email" class="form-control" placeholder="you@example.com" data-validate="required,email" required aria-required="true" autocomplete="email"/>
            <p class="form-error" role="alert"></p>
          </div>
          <div class="form-group">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <label class="form-label" for="login-password">Password</label>
              <a href="#" style="font-size:var(--text-xs);color:var(--color-brown);font-weight:600">Forgot password?</a>
            </div>
            <div class="form-password-wrap">
              <input type="password" id="login-password" name="password" class="form-control" placeholder="••••••••" data-validate="required" required aria-required="true" autocomplete="current-password"/>
              <button type="button" class="form-password-toggle" aria-label="Toggle password visibility">
                <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
            <p class="form-error" role="alert"></p>
          </div>
          <div class="form-group">
            <label class="form-check">
              <input type="checkbox" id="remember-me" name="remember"/>
              <span class="form-check-label">Keep me signed in for 30 days</span>
            </label>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-submit">Sign In</button>
        </form>

        <p class="auth-footer-text">Don't have an account? <a href="register.html">Create one free</a></p>
      </div>
    </div>
  </div>
</main>
<script src="../assets/js/theme.js"></script><script src="../assets/js/rtl.js"></script><script src="../assets/js/forms.js"></script>
<script>
  document.getElementById('login-form')?.addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('login-submit');
    btn.innerHTML = '<span class="spinner"></span> Signing in…'; btn.disabled = true;
    setTimeout(() => { window.location.href = 'dashboard-user.html'; }, 1200);
  });
</script>
</body>
</html>
