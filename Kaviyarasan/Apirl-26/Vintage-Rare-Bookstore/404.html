<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Page Not Found 404 | VintStore</title>
 <meta name="description" content="The page you're looking for has been lost to history. Return to our rare book collection.">
 <meta name="robots" content="noindex">
 <link rel="icon" type="image/svg+xml" href="assets/images/favicons/favicon.svg">
 <link rel="stylesheet" href="assets/css/main.css">
 <link rel="stylesheet" href="assets/css/animations.css">
 <link rel="stylesheet" href="assets/css/dark-mode.css">
 <style>
  html,body{height:100%;overflow:hidden;background:var(--bg-primary);color:var(--text-primary)}
 .not-found-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:var(--space-xl);position:relative;overflow:hidden}
 .falling-pages-container{position:fixed;inset:0;pointer-events:none;z-index:0}
 .falling-page{position:absolute;width:40px;height:52px;background:var(--cream);border-radius:2px;box-shadow:var(--shadow-sm);animation:fallPage linear infinite;opacity:0}
 @keyframes fallPage{0%{transform:translateY(-80px) rotate(0deg) translateX(0);opacity:0}5%{opacity:1}95%{opacity:0.6}100%{transform:translateY(110vh) rotate(720deg) translateX(60px);opacity:0}}
 .error-content{position:relative;z-index:1;max-width:600px}
 .error-num{font-family:var(--font-heading);font-size:clamp(6rem,20vw,12rem);font-weight:800;line-height:.85;background:linear-gradient(135deg,var(--accent),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--space-md);display:block}
 .error-icon{font-size:4rem;margin-bottom:var(--space-lg);display:block;animation:bookFloat 4s ease-in-out infinite}
 @keyframes bookFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
  .error-title{color:var(--text-primary);font-size:2rem;margin-bottom:var(--space-md)}
  .error-text{color:var(--text-secondary);font-size:1.0625rem;line-height:1.7;max-width:480px;margin:0 auto var(--space-2xl)}
 .error-actions{display:flex;gap:var(--space-md);justify-content:center;flex-wrap:wrap}
 .search-wrapper{max-width:400px;margin:var(--space-xl) auto 0;position:relative}
  .search-wrapper input{width:100%;padding:12px 20px 12px 46px;border-radius:100px;border:2px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-family:var(--font-ui);font-size:0.9375rem;backdrop-filter:blur(8px)}
  .search-wrapper input::placeholder{color:var(--text-muted)}
  .search-wrapper svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
  .theme-corner{position:fixed;top:1rem;right:1rem;display:flex;gap:var(--space-xs);z-index:100}
  [dir="rtl"] .theme-corner{right:auto;left:1rem}
 /* Book shelves deco */
 .shelf-deco{position:fixed;bottom:-20px;left:0;right:0;height:120px;background:linear-gradient(to top,rgba(93,58,26,0.5),transparent);pointer-events:none}
 .shelf-books{position:fixed;bottom:0;left:0;right:0;height:80px;display:flex;align-items:flex-end;justify-content:center;gap:4px;pointer-events:none;overflow:hidden}
 .shelf-book{width:28px;border-radius:2px 4px 4px 2px;opacity:0.4}
 @media(max-width:640px){.error-actions{flex-direction:column;align-items:center}}
 </style>
</head>
<body>
 <div class="falling-pages-container" aria-hidden="true"></div>

 <div class="not-found-page">
 <div class="shelf-deco" aria-hidden="true"></div>
 <div class="shelf-books" aria-hidden="true">
 <div class="shelf-book" style="height:60px;background:#8B4513"></div>
 <div class="shelf-book" style="height:72px;background:#D4AF37"></div>
 <div class="shelf-book" style="height:55px;background:#2E4A4E"></div>
 <div class="shelf-book" style="height:68px;background:#5D3A1A"></div>
 <div class="shelf-book" style="height:80px;background:#4A2E50"></div>
 <div class="shelf-book" style="height:62px;background:#8B4513"></div>
 <div class="shelf-book" style="height:74px;background:#3D6B70"></div>
 <div class="shelf-book" style="height:58px;background:#D4AF37;opacity:0.25"></div>
 </div>

 <div class="theme-corner">
 <button id="rtl-toggle" class="nav-icon-btn" aria-label="Toggle RTL/LTR" title="Toggle RTL/LTR"><span class="rtl-indicator">RTL</span></button>
  <button id="theme-toggle" class="nav-icon-btn" aria-label="Toggle theme" title="Toggle theme">
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
 </div>

 <div class="error-content">
  <a href="index.html" class="navbar__logo" style="margin-bottom:var(--space-2xl); justify-content: center;">
    <div class="navbar__logo-mark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="url(#goldGradient404)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="width:40px; height:40px;"><defs><linearGradient id="goldGradient404" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#8B4513"/></linearGradient></defs><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
    </div>
    <span class="navbar__logo-text" style="font-size: 1.75rem;">VintStore</span>
  </a>
 <span class="error-icon" aria-hidden="true"></span>
 <span class="error-num" aria-label="404">404</span>
 <h1 class="error-title">Chapter Not Found</h1>
 <p class="error-text">Like a rare book that slipped between the shelves, the page you're looking for has been lost to history. Perhaps it was an early edition that never made it to print.</p>
  <div class="error-actions">
    <a href="index.html" class="btn btn-accent btn-lg" style="min-width: 200px;">Return Home</a>
    <a href="services.html" class="btn btn-outline btn-lg" style="min-width: 200px;">Browse Services</a>
  </div>
 <div class="search-wrapper" role="search">
 <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
 <input type="search" placeholder="Search our collection..." aria-label="Search the bookstore" onkeypress="if(event.key==='Enter')window.location.href='blog.html'">
 </div>
 </div>
 </div>

 <script src="assets/js/main.js" defer></script>
 <script src="assets/js/animations.js" defer></script>
 <script src="assets/js/rtl-ltr.js" defer></script>

</body>
</html>
