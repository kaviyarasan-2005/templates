<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | VintStore</title>
  <meta name="description" content="Sign in to your VintStore account to access your collection, orders, and services.">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font-ui, 'Inter', sans-serif); background: #1a0e06; }

    /* -- Premium Background -- */
    .auth-scene {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('assets/images/backgrounds/bright-hero-library.png');
      background-size: cover;
      background-position: center;
      animation: authKenBurns 40s alternate infinite ease-in-out;
      transform: scale(1.05);
    }
    .auth-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(135deg, rgba(26,20,16,0.7) 0%, rgba(93,58,26,0.4) 50%, rgba(26,20,16,0.75) 100%);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    @keyframes authKenBurns { 0%{transform:scale(1.05)} 100%{transform:scale(1.15)} }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.065; }
      90%  { opacity: 0.065; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    /* -- Layout -- */
    .auth-page {
      position: relative; z-index: 10; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 3rem 1rem;
    }

    /* -- Card -- */
    .auth-card {
      width: 100%; max-width: 500px;
      background: rgba(255,255,255,0.055);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 28px;
      padding: 2.5rem 2.75rem 2.25rem;
      box-shadow: 0 40px 100px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardIn 0.65s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(32px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    [data-theme="dark"] .auth-card { background: rgba(18,10,4,0.58); border-color: rgba(212,175,55,0.15); }

    /* -- Logo -- */
    .auth-logo { text-align: center; margin-bottom: 1.5rem; }
    .auth-logo a { display: inline-flex; flex-direction: column; align-items: center; gap: 9px; text-decoration: none; }
    .auth-logo-mark {
      width: 60px; height: 60px; border-radius: 15px;
      background: rgba(212,175,55,0.05);
      border: 1px solid rgba(212,175,55,0.2);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .auth-logo-mark svg { width: 36px; height: 36px; }
    .auth-logo a:hover .auth-logo-mark { transform: translateY(-3px) rotate(-4deg); box-shadow: 0 14px 32px rgba(212,175,55,0.15); }
    .auth-logo-name { 
      font-family: var(--font-heading, Georgia, serif); 
      font-size: 1.5rem; 
      font-weight: 800; 
      background: linear-gradient(135deg, #D4AF37 0%, #D4AF37 50%, #8B4513 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-fill-color: transparent;
      letter-spacing: 0.05em;
      text-transform: uppercase; 
    }
    .auth-logo-sub { font-size: 0.7rem; color: rgba(212,175,55,0.7); letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--font-ui); margin-top: -4px; }

    /* -- Heading -- */
    .auth-heading { text-align: center; margin-bottom: 1.5rem; }
    .auth-heading h1 { font-family: var(--font-heading, Georgia, serif); font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 5px; }
    .auth-heading p { font-size: 0.875rem; color: rgba(255,255,255,0.45); }

    /* -- Social buttons -- */
    .social-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
    .soc-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.85);
      font-family: var(--font-ui); font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
    }
    .soc-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.22); transform: translateY(-1px); }

    /* Or divider */
    .or-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
    .or-divider span { font-size: 0.75rem; color: rgba(255,255,255,0.35); white-space: nowrap; font-family: var(--font-ui); }

    /* -- Form -- */
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.65); font-family: var(--font-ui); }
    .field-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: rgba(212,175,55,0.55); pointer-events: none; display: flex;
    }
    .form-input {
      width: 100%; padding: 11px 13px 11px 40px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 11px; color: #fff; font-family: var(--font-ui); font-size: 0.9rem;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; outline: none;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.25); }
    .form-input:focus { border-color: rgba(212,175,55,0.5); background: rgba(255,255,255,0.08); box-shadow: 0 0 0 3px rgba(212,175,55,0.1); }
    .field-action {
      position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.35); display: flex; padding: 4px; transition: color 0.2s;
    }
    .field-action:hover { color: rgba(212,175,55,0.8); }

    /* Options row */
    .form-options-row { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-ui); font-size: 0.8125rem; margin-bottom: 2px; }
    .check-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .check-label input { width: 15px; height: 15px; accent-color: #D4AF37; flex-shrink: 0; }
    .check-label span { font-family: var(--font-ui); font-size: 0.8125rem; color: rgba(255,255,255,0.45); }
    .check-label a { color: rgba(212,175,55,0.8); font-weight: 600; text-decoration: none; }
    .check-label a:hover { color: #D4AF37; }
    .forgot-link { color: rgba(212,175,55,0.85); font-weight: 600; text-decoration: none; transition: color 0.2s; }
    .forgot-link:hover { color: #D4AF37; }

    /* Submit */
    .btn-submit {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #D4AF37, #c9991f);
      border: none; border-radius: 12px; color: #1a0e06;
      font-family: var(--font-ui); font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: all 0.25s ease;
      box-shadow: 0 4px 18px rgba(212,175,55,0.35); position: relative; overflow: hidden;
    }
    .btn-submit::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent); opacity:0; transition:opacity 0.2s; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,175,55,0.45); }
    .btn-submit:hover::after { opacity: 1; }

    /* Footer */
    .auth-switch { text-align: center; margin-top: 1.1rem; font-family: var(--font-ui); font-size: 0.875rem; color: rgba(255,255,255,0.38); }
    .auth-switch a { color: rgba(212,175,55,0.85); font-weight: 600; text-decoration: none; }
    .auth-switch a:hover { color: #D4AF37; }

    /* Theme toggle */
    .auth-topbar { position: fixed; top: 1rem; right: 1rem; z-index: 200; display: flex; flex-direction: row; gap: 8px; }
    .theme-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: rgba(255,255,255,0.7); transition: all 0.2s;
      backdrop-filter: blur(10px);
    }
    .theme-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }

    @media (max-width:520px) {
      .auth-card { padding: 2rem 1.5rem 1.75rem; }
    }
  </style>
</head>
<body>

  <!-- Background Scene -->
  <div class="auth-scene"></div>
  <div class="auth-overlay"></div>
  <span class="float-el" style="left:22%;animation-duration:22s;animation-delay:-4s;font-size:2.2rem">❈</span>
  <span class="float-el" style="left:55%;animation-duration:16s;animation-delay:-8s;font-size:1.2rem">✎</span>
  <span class="float-el" style="left:72%;animation-duration:20s;animation-delay:-2s;font-size:1.8rem">⚲</span>
  <span class="float-el" style="left:88%;animation-duration:14s;animation-delay:-6s;font-size:1.4rem">✑</span>
  <span class="float-el" style="left:38%;animation-duration:25s;animation-delay:-11s;font-size:1rem">✎</span>

  <!-- Theme Toggle -->
  <div class="auth-topbar">
    <button id="rtl-toggle" class="theme-btn" aria-label="Switch to RTL layout" title="Toggle RTL/LTR"><span class="rtl-indicator">RTL</span></button>
    <button id="theme-toggle" class="theme-btn" aria-label="Switch to dark mode" title="Toggle theme">
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <!-- Page -->
  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <a href="index.html" aria-label="Return to Home">
          <div class="auth-logo-mark"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><defs><linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D4AF37"/><stop offset="100%" stop-color="#8B4513"/></linearGradient></defs><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path><line x1="16" y1="8" x2="2" y2="22"></line><line x1="17.5" y1="15" x2="9" y2="15"></line></svg></div>
          <span class="auth-logo-name">VintStore</span>
          <span class="auth-logo-sub">Rare &amp; Vintage Books</span>
        </a>
      </div>

      <!-- Heading -->
      <div class="auth-heading">
        <h1>Welcome Back</h1>
        <p>Sign in to your collector's account</p>
      </div>

      <!-- Social Login -->
      <div class="social-row">
        <button class="soc-btn" type="button" aria-label="Continue with Google">
          <svg width="17" height="17" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
          </svg>
          Google
        </button>
        <button class="soc-btn" type="button" aria-label="Continue with Apple">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
          </svg>
          Apple
        </button>
      </div>

      <div class="or-divider"><span>or continue with email</span></div>

      <!-- Form -->
      <form id="login-form" class="auth-form" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label for="login-email" class="field-label">Email Address</label>
          <div class="field-wrap">
            <span class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="login-email" name="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="login-password" class="field-label">Password</label>
          <div class="field-wrap">
            <span class="field-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="login-password" name="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
            <button type="button" class="field-action pw-toggle" aria-label="Show password">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="form-options-row">
          <label class="check-label">
            <input type="checkbox" id="remember-me" name="remember"> <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Terms -->
        <label class="check-label">
          <input type="checkbox" id="login-terms" name="terms" required>
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
        </label>

        <button type="submit" class="btn-submit" id="login-btn">Login</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Sign up</a></p>
    </div>
  </div>

  <script src="assets/js/main.js" defer></script>
  <script src="assets/js/forms.js" defer></script>
  <script src="assets/js/rtl-ltr.js" defer></script>
</body>
</html>
