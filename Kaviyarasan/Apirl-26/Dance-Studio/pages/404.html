<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Alan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300..800&family=Dancing+Script:wght@400..700&family=Cairo:wght@300..900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <style>
    .error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-primary);position:relative;overflow:hidden}
    .error-page__bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(107,70,193,.08) 0%,transparent 50%),radial-gradient(ellipse at 70% 30%,rgba(255,107,107,.06) 0%,transparent 50%)}
    .error-content{position:relative;z-index:1;text-align:center;padding:var(--space-8);max-width:600px}
    .error-content__number{font-size:clamp(8rem,20vw,14rem);font-weight:var(--font-weight-black);line-height:1;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative}
    .error-content__number::after{content:'';position:absolute;bottom:10%;left:10%;right:10%;height:30%;background:var(--gradient-primary);opacity:.1;filter:blur(40px);border-radius:50%}
    .error-content__title{font-size:var(--font-size-3xl);margin:var(--space-4) 0 var(--space-4)}
    .error-content__text{color:var(--text-tertiary);font-size:var(--font-size-lg);margin-bottom:var(--space-8);max-width:450px;margin-inline:auto}
    .error-content__dancer{font-size:6rem;margin-bottom:var(--space-4);animation:float 4s ease-in-out infinite}
    .error-content__buttons{display:flex;gap:var(--space-4);justify-content:center;flex-wrap:wrap}
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-page__bg"></div>
    <div class="auth-topbar">
      <a href="../index.html" class="navbar__logo" style="text-decoration:none;">
        <div class="navbar__logo-icon"><i class="fas fa-music"></i></div>
        <div class="navbar__logo-text"><span>Alan</span></div>
      </a>
      <div class="auth-toggles" style="display:flex; gap:var(--space-2);">
        <button class="navbar__action-btn" data-rtl-toggle aria-label="Toggle RTL"><i class="fas fa-globe"></i></button>
        <button class="navbar__action-btn" data-theme-toggle aria-label="Theme"><i class="fas fa-moon"></i></button>
      </div>
    </div>
    <div class="error-content">
      <div class="error-content__dancer">💃</div>
      <div class="error-content__number">404</div>
      <h1 class="error-content__title">Oops! This Page Missed a Step</h1>
      <p class="error-content__text">Looks like this page took a wrong turn on the dance floor. Let's get you back in rhythm.</p>
      <div class="error-content__buttons">
        <a href="../index.html" class="btn btn--primary btn--lg"><i class="fas fa-home"></i> Back Home</a>
        <a href="services.html" class="btn btn--ghost btn--lg"><i class="fas fa-search"></i> Browse Classes</a>
      </div>
    </div>
  </div>
  <script src="../assets/js/modules/theme.js"></script>
  <script src="../assets/js/modules/rtl.js"></script>
  <script src="../assets/js/modules/navigation.js"></script>
  <script src="../assets/js/modules/animations.js"></script>
  <script src="../assets/js/modules/dashboard.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
