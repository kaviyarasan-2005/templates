<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Alan account.">
  <title>Sign In — Alan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300..800&family=Dancing+Script:wght@400..700&family=Cairo:wght@300..900&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/variables.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
  <div class="auth-page">
    <!-- Animated Cosmic Background -->
    <div class="landing__bg" style="position: fixed; inset: 0; z-index: -1;">
      <div class="landing__bg-gradient"></div>
      <canvas class="landing__particles" id="landing-particles"></canvas>
    </div>

    <!-- Perfectly Aligned Topbar for Toggles & Back -->
    <div class="auth-topbar">
      <a href="../index.html" class="navbar__logo" style="text-decoration:none;">
        <div class="navbar__logo-icon"><i class="fas fa-music"></i></div>
        <div class="navbar__logo-text"><span>Alan</span></div>
      </a>
      <div class="auth-toggles">
        <button class="navbar__action-btn" data-theme-toggle aria-label="Theme"><i class="fas fa-moon"></i></button>
        <button class="navbar__action-btn" data-rtl-toggle aria-label="Toggle RTL"><i class="fas fa-globe"></i></button>
      </div>
    </div>

    <!-- Centered Glass Card -->
    <div class="auth-container">
      <div class="auth-glass-card">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Don't have an account? <a href="register.html">Create one free</a></p>

        <div class="auth-social">
          <button class="auth-social__btn"><i class="fab fa-google" style="color:#EA4335"></i> Google</button>
          <button class="auth-social__btn"><i class="fab fa-facebook-f" style="color:#1877F2"></i> Facebook</button>
          <button class="auth-social__btn"><i class="fab fa-apple"></i> Apple</button>
        </div>

        <div class="auth-divider"><span>or sign in with email</span></div>

        <form class="auth-form" data-validate>
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email Address</label>
            <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required>
            <span class="form-error">Please enter a valid email</span>
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <div class="password-wrap">
              <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required>
              <button type="button" class="password-toggle" aria-label="Toggle password visibility" onclick="const i=this.previousElementSibling;i.type=i.type==='password'?'text':'password';this.innerHTML=i.type==='password'?'<i class=\'fas fa-eye\'></i>':'<i class=\'fas fa-eye-slash\'></i>'"><i class="fas fa-eye"></i></button>
            </div>
            <span class="form-error">Password is required</span>
          </div>
          <div class="auth-form__options">
            <label class="auth-form__remember"><input type="checkbox"> Remember me</label>
            <a href="#" class="auth-form__forgot">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn--primary btn--lg" style="width:100%">
            Sign In <i class="fas fa-arrow-right"></i>
          </button>
        </form>

        <p style="text-align:center;font-size:var(--font-size-xs);color:var(--text-tertiary);margin-top:var(--space-8)">
          By signing in, you agree to our <a href="#" style="color:var(--color-primary)">Terms of Service</a> and <a href="#" style="color:var(--color-primary)">Privacy Policy</a>
        </p>
      </div>
    </div>
  </div>


  <script src="../assets/js/modules/theme.js"></script>
  <script src="../assets/js/modules/rtl.js"></script>
  <script src="../assets/js/modules/navigation.js"></script>
  <script src="../assets/js/modules/animations.js"></script>
  <script src="../assets/js/modules/dashboard.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
