<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Lumina</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column;
      --color-primary: #0D7377; --color-secondary: #D4AF37;
      --color-surface: #F8F9FA; --color-text-secondary: #6C757D;
      background: var(--color-surface);
    }
    .top-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      width: 100%;
      padding: 24px 32px; 
    }
    .logo-bar { 
      display: flex; 
      align-items: center; 
      gap: 10px;
      font-family: 'Playfair Display', serif; 
      font-size: 1.25rem; 
      font-weight: 700;
      color: var(--color-primary); 
      text-decoration: none;
    }
    .error-page {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 40px 24px;
    }
    .error-num {
      font-family: 'Playfair Display', serif; font-size: clamp(100px, 20vw, 200px);
      font-weight: 700; line-height: 1; color: transparent;
      -webkit-text-stroke: 3px var(--color-primary);
      position: relative; margin-bottom: -20px;
    }
    .sofa-illustration {
      width: 240px; max-width: 80vw; margin: 8px auto;
    }
    .error-page h1 {
      font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 4vw, 2rem);
      color: #212529; margin-bottom: 12px;
    }
    .error-page p {
      color: var(--color-text-secondary); max-width: 440px; margin: 0 auto 32px; font-size: 1.0625rem; line-height: 1.7;
    }
    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 44px; padding: 0 24px; border-radius: 8px; font-weight: 600; font-size: 0.9375rem;
      cursor: pointer; text-decoration: none; border: 1px solid transparent; transition: all 0.2s;
    }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-primary:hover { background: #074345; transform: translateY(-2px); }
    .btn-outline { background: transparent; color: var(--color-primary); border-color: var(--color-primary); }
    .btn-outline:hover { background: var(--color-primary); color: white; }
    .floating-room { animation: float 4s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  </style>

  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <script src="assets/js/theme-toggle.js"></script>
</head>
<body>
  <header class="top-header">
    <a href="home-1.html" class="logo-bar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 22h20L12 2z"></path></svg>
      Lumina
    </a>
      
    <div class="navbar-actions" style="gap: 8px; display: flex;">
      <button class="icon-btn" id="themeToggle" aria-label="Toggle dark/light mode">
        <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>
      <button class="icon-btn" id="langToggle" aria-label="Toggle language direction" >RTL</button>
    </div>
  </header>

  <div class="error-page">
    <div class="error-num">404</div>

    <!-- Illustrated empty room SVG -->
    <svg class="sofa-illustration floating-room" viewBox="0 0 240 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Floor -->
      <rect y="110" width="240" height="30" fill="#e8f4f4" rx="4"/>
      <!-- Sofa body -->
      <rect x="40" y="72" width="160" height="42" rx="10" fill="#0D7377" opacity="0.15"/>
      <!-- Cushions -->
      <rect x="55" y="60" width="55" height="36" rx="8" fill="#0D7377" opacity="0.3"/>
      <rect x="130" y="60" width="55" height="36" rx="8" fill="#0D7377" opacity="0.3"/>
      <!-- Left arm -->
      <rect x="28" y="65" width="20" height="49" rx="6" fill="#0D7377" opacity="0.2"/>
      <!-- Right arm -->
      <rect x="192" y="65" width="20" height="49" rx="6" fill="#0D7377" opacity="0.2"/>
      <!-- Plant pot -->
      <rect x="186" y="90" width="20" height="22" rx="3" fill="#D4AF37" opacity="0.5"/>
      <ellipse cx="196" cy="89" rx="12" ry="8" fill="#0D7377" opacity="0.3"/>
      <!-- Question mark -->
      <text x="120" y="48" text-anchor="middle" font-size="28" fill="#0D7377" opacity="0.6" font-family="Georgia, serif" font-weight="700">?</text>
    </svg>

    <h1>This Room Is Empty</h1>
    <p>The page you are looking for has moved, been removed, or never existed in the first place. Let's get you back to a better-designed space.</p>

    <div class="btn-group">
      <a href="home-1.html" class="btn btn-primary">Back to Home</a>
      <a href="services.html" class="btn btn-outline">Browse Services</a>
    </div>
  </div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/animations.js"></script>
</body>
</html>
