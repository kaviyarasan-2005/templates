<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | RV adven Rentals</title>
  <meta name="description" content="Create your free RV adven Rentals account and start planning your perfect road trip today." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicons/favicon.svg" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    /* Premium Centered Glassmorphism Style */
    html, body { 
      min-height: 100%; 
      margin: 0; 
      padding: 0; 
      transition: background 0.3s ease;
    }
    
    .register-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      transition: all 0.3s ease;
    }

    /* Fixed full screen background */
    .bg-image {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('https://images.unsplash.com/photo-1523987355523-c7b5b0dd90a7?w=1920&q=80') center/cover no-repeat;
      z-index: 0;
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      transition: background 0.4s ease;
    }

    [data-theme="light"] .bg-overlay {
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(200,220,210,0.6) 100%);
    }
    [data-theme="dark"] .bg-overlay {
      background: linear-gradient(135deg, rgba(10,26,15,0.7) 0%, rgba(0,0,0,0.85) 100%);
    }

    /* Form Container */
    .glass-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 48px 40px;
      transition: all 0.4s ease;
    }

    [data-theme="light"] .glass-card {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }
    [data-theme="dark"] .glass-card {
      background: rgba(20, 25, 22, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    /* Form internal elements responsiveness */
    [data-theme="light"] .glass-card .register-title, 
    [data-theme="light"] .glass-card .register-form-logo-name { color: var(--color-text-primary); }
    [data-theme="dark"] .glass-card .register-title, 
    [data-theme="dark"] .glass-card .register-form-logo-name { color: #fff; }

    [data-theme="light"] .glass-card .register-subtitle, 
    [data-theme="light"] .glass-card .register-form-logo-tag, 
    [data-theme="light"] .glass-card .divider-text span { color: var(--color-text-secondary); }
    [data-theme="dark"] .glass-card .register-subtitle, 
    [data-theme="dark"] .glass-card .register-form-logo-tag, 
    [data-theme="dark"] .glass-card .divider-text span { color: rgba(255,255,255,0.7); }

    [data-theme="light"] .glass-card .form-label { color: var(--color-text-primary); }
    [data-theme="dark"] .glass-card .form-label { color: rgba(255,255,255,0.85); }
    
    .glass-card .form-input {
      transition: all 0.3s ease;
    }
    [data-theme="light"] .glass-card .form-input {
      background: rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: var(--color-text-primary);
    }
    [data-theme="dark"] .glass-card .form-input {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    [data-theme="light"] .glass-card .form-input::placeholder { color: rgba(0,0,0,0.4); }
    [data-theme="dark"] .glass-card .form-input::placeholder { color: rgba(255,255,255,0.4); }

    .glass-card .btn-light-glass {
      transition: all 0.3s ease;
    }
    [data-theme="light"] .glass-card .btn-light-glass {
      background: rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: var(--color-text-primary);
    }
    [data-theme="dark"] .glass-card .btn-light-glass {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
    }
    .glass-card .btn-light-glass:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    [data-theme="light"] .auth-toggles button {
      background: rgba(0,0,0,0.05) !important;
      color: var(--color-text-primary) !important;
      border-color: rgba(0,0,0,0.1) !important;
    }

    .register-form-logo { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 32px; text-decoration: none; }
    .register-form-logo-icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light)); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; box-shadow: var(--shadow-primary); }
    .register-form-logo-name { font-family: 'Montserrat', sans-serif; font-weight: 800; }
    .register-form-logo-tag { font-size: 0.78rem; }
    
    .register-title { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .register-subtitle { text-align: center; font-size: 0.875rem; margin-bottom: 28px; }
    
    .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    
    .password-wrapper { position: relative; }
    .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; transition: color 0.3s; }
    [data-theme="light"] .password-toggle { color: rgba(0,0,0,0.4); }
    [data-theme="dark"] .password-toggle { color: rgba(255,255,255,0.5); }
    .password-toggle:hover { color: var(--color-primary); }

    .password-strength { height: 4px; border-radius: 99px; margin-top: 6px; overflow: hidden; }
    [data-theme="light"] .password-strength { background: rgba(0,0,0,0.05); }
    [data-theme="dark"] .password-strength { background: rgba(255,255,255,0.1); }
    
    .password-strength-fill { height: 100%; border-radius: 99px; transition: width 0.3s, background 0.3s; background: var(--color-error); width: 0%; }
    .strength-label { font-size: 0.72rem; margin-top: 4px; }
    [data-theme="light"] .strength-label { color: var(--color-text-secondary); }
    [data-theme="dark"] .strength-label { color: rgba(255,255,255,0.6); }
    
    .terms-row { display: flex; align-items: flex-start; gap: 10px; font-size: 0.82rem; }
    [data-theme="light"] .terms-row { color: var(--color-text-secondary); }
    [data-theme="dark"] .terms-row { color: rgba(255,255,255,0.7); }

    .terms-row input { margin-top: 2px; accent-color: var(--color-primary); width: 16px; height: 16px; flex-shrink: 0; }
    .terms-row a { color: var(--color-primary); font-weight: 600; text-decoration: none; }
    .terms-row a:hover { text-decoration: underline; color: var(--color-primary-light); }

    .divider-text { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; margin-top: 24px; }
    .divider-text::before, .divider-text::after { content: ''; flex: 1; height: 1px; }
    [data-theme="light"] .divider-text::before, [data-theme="light"] .divider-text::after { background: rgba(0,0,0,0.1); }
    [data-theme="dark"] .divider-text::before, [data-theme="dark"] .divider-text::after { background: rgba(255,255,255,0.15); }
    
    .divider-text span { font-size: 0.78rem; white-space: nowrap; }

    .back-link { font-size: 0.78rem; text-decoration: none; transition: color 0.3s; }
    [data-theme="light"] .back-link { color: var(--color-text-muted); }
    [data-theme="dark"] .back-link { color: rgba(255,255,255,0.5); }
    .back-link:hover { color: var(--color-primary); }

    .register-footer-text { text-align: center; font-size: 0.85rem; margin-top: 24px; transition: color 0.3s; }
    [data-theme="light"] .register-footer-text { color: var(--color-text-secondary); }
    [data-theme="dark"] .register-footer-text { color: rgba(255,255,255,0.7); }

    @media (max-width: 480px) {
      .name-row { grid-template-columns: 1fr; }
      .glass-card { padding: 40px 24px; border: none; border-radius: 16px; }
      .register-wrapper { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <!-- Floating Toggles -->
  <div class="auth-toggles" style="position:fixed; top:20px; right:20px; z-index:1000; display:flex; gap:10px;">
    <button class="navbar-icon-btn" data-theme-toggle aria-label="Toggle dark mode" style="background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); color:white; border:1px solid rgba(255,255,255,0.2); width:40px; height:40px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;">
      <i class="fas fa-moon"></i>
    </button>
    <button class="navbar-icon-btn" data-dir-toggle aria-label="Toggle RTL/LTR" style="background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); color:white; border:1px solid rgba(255,255,255,0.2); width:40px; height:40px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;">
      <i class="fas fa-globe"></i>
    </button>
  </div>

  <div class="register-wrapper">
    <main class="glass-card" aria-label="Registration form">
      <!-- Logo -->
      <a href="index.html" class="register-form-logo" aria-label="RV adven Rentals home">
        <div class="register-form-logo-icon"><i class="fas fa-campground"></i></div>
        <div class="register-form-logo-name">RV adven</div>
        <div class="register-form-logo-tag">Rentals & Guides</div>
      </a>

      <h1 class="register-title">Create Your Account</h1>
      <p class="register-subtitle">Join free â€” no credit card required</p>

      <!-- Social Sign Up -->
      <div style="display:flex;gap:10px;margin-bottom:12px;">
        <button class="btn btn-light-glass w-full" id="register-google-btn" type="button" aria-label="Sign up with Google">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true" style="margin-right:8px;"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.21-8.16 2.21-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
          Google
        </button>
        <button class="btn btn-light-glass w-full" id="register-apple-btn" type="button" aria-label="Sign up with Apple"><i class="fab fa-apple"></i> Apple</button>
      </div>

      <div class="divider-text"><span>or create with email</span></div>

      <form data-validate id="register-form" novalidate>
        <div class="name-row">
          <div class="form-group">
            <label class="form-label" for="reg-fname">First Name</label>
            <input type="text" class="form-input" id="reg-fname" name="fname" required placeholder="John" autocomplete="given-name" />
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-lname">Last Name</label>
            <input type="text" class="form-input" id="reg-lname" name="lname" required placeholder="Doe" autocomplete="family-name" />
          </div>
        </div>
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label" for="reg-email">Email Address</label>
          <input type="email" class="form-input" id="reg-email" name="email" required placeholder="john@example.com" autocomplete="email" />
        </div>
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label" for="reg-password">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-input" id="reg-password" name="password" required placeholder="Min. 8 characters" autocomplete="new-password" minlength="8" />
          </div>
          <div class="password-strength"><div class="password-strength-fill" id="pw-strength-fill"></div></div>
          <div class="strength-label" id="pw-strength-label">Password strength: enter a password</div>
        </div>
        <div class="form-group" style="margin-bottom:24px;">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-input" id="reg-confirm" name="confirm" required placeholder="Repeat your password" autocomplete="new-password" />
          </div>
        </div>
        <div class="terms-row" style="margin-bottom:20px;">
          <input type="checkbox" id="agree-terms" required />
          <label for="agree-terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>
        <div class="terms-row" style="margin-bottom:28px;">
          <input type="checkbox" id="agree-marketing" />
          <label for="agree-marketing">Send me exclusive deals and itinerary ideas</label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="register-submit-btn"><i class="fas fa-user-plus"></i> Create My Account</button>
      </form>

      <div class="register-footer-text">
        Already have an account? <a href="login.html" style="color:var(--color-primary);font-weight:600;text-decoration:none;">Sign in</a>
      </div>
      <div style="text-align:center;margin-top:16px;">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    </main>
  </div>

  <script src="../assets/js/main.js" defer></script>
  <script>

    document.getElementById('reg-password')?.addEventListener('input', (e) => {
      const val = e.target.value;
      const fill = document.getElementById('pw-strength-fill');
      const label = document.getElementById('pw-strength-label');
      if (!fill || !label) return;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = ['', 'weak', 'fair', 'good', 'strong'];
      const colors = ['', '#E74C3C', '#F39C12', '#3498DB', '#27AE60'];
      const labels = ['enter a password', 'Weak â€” add numbers', 'Fair â€” add capitals', 'Good â€” almost there', 'Strong password âœ“'];
      fill.style.width = (score * 25) + '%';
      fill.style.background = colors[score] || '';
      label.textContent = 'Password strength: ' + (labels[score] || labels[0]);
      label.style.color = colors[score] || '';
    });
  </script>
</body>
</html>
