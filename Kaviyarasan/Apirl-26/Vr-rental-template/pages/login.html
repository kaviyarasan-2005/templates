<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | RV adven Rentals</title>
  <meta name="description" content="Sign in to your account." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicons/favicon.svg" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <style>
    /* Premium Centered Glassmorphism Style */
    html, body { 
      min-height: 100%; 
      margin: 0; 
      padding: 0; 
      transition: background 0.3s ease;
    }
    
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      transition: all 0.3s ease;
    }

    /* Fixed full screen background */
    .bg-image {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url('https://images.unsplash.com/photo-1523987355523-c7b5b0dd90a7?w=1920&q=80') center/cover no-repeat;
      z-index: 0;
    }
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      transition: background 0.4s ease;
    }

    [data-theme="light"] .bg-overlay {
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(200,220,210,0.6) 100%);
    }
    [data-theme="dark"] .bg-overlay {
      background: linear-gradient(135deg, rgba(10,26,15,0.7) 0%, rgba(0,0,0,0.85) 100%);
    }

    /* Form Container */
    .glass-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 460px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 48px 40px;
      transition: all 0.4s ease;
    }

    [data-theme="light"] .glass-card {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }
    [data-theme="dark"] .glass-card {
      background: rgba(20, 25, 22, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    /* Form internal elements responsiveness */
    [data-theme="light"] .glass-card .login-title, 
    [data-theme="light"] .glass-card .login-form-logo-name { color: var(--color-text-primary); }
    [data-theme="dark"] .glass-card .login-title, 
    [data-theme="dark"] .glass-card .login-form-logo-name { color: #fff; }

    [data-theme="light"] .glass-card .login-subtitle, 
    [data-theme="light"] .glass-card .login-form-logo-tag, 
    [data-theme="light"] .glass-card .divider-text span { color: var(--color-text-secondary); }
    [data-theme="dark"] .glass-card .login-subtitle, 
    [data-theme="dark"] .glass-card .login-form-logo-tag, 
    [data-theme="dark"] .glass-card .divider-text span { color: rgba(255,255,255,0.7); }

    [data-theme="light"] .glass-card .form-label { color: var(--color-text-primary); }
    [data-theme="dark"] .glass-card .form-label { color: rgba(255,255,255,0.85); }
    
    .glass-card .form-input {
      transition: all 0.3s ease;
    }
    [data-theme="light"] .glass-card .form-input {
      background: rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: var(--color-text-primary);
    }
    [data-theme="dark"] .glass-card .form-input {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
    }

    [data-theme="light"] .glass-card .form-input::placeholder { color: rgba(0,0,0,0.4); }
    [data-theme="dark"] .glass-card .form-input::placeholder { color: rgba(255,255,255,0.4); }

    .glass-card .btn-light-glass {
      transition: all 0.3s ease;
    }
    [data-theme="light"] .glass-card .btn-light-glass {
      background: rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: var(--color-text-primary);
    }
    [data-theme="dark"] .glass-card .btn-light-glass {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
    }
    .glass-card .btn-light-glass:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    [data-theme="light"] .auth-toggles button {
      background: rgba(0,0,0,0.05) !important;
      color: var(--color-text-primary) !important;
      border-color: rgba(0,0,0,0.1) !important;
    }

    .login-form-logo { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; margin-bottom: 36px; text-decoration: none; }
    .login-form-logo-icon { width: 56px; height: 56px; background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light)); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.6rem; box-shadow: var(--shadow-primary); }
    .login-form-logo-name { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.2rem; }
    .login-form-logo-tag { font-size: 0.8rem; }
    
    .login-title { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .login-subtitle { text-align: center; font-size: 0.875rem; margin-bottom: 28px; }
    
    .social-login-row { display: flex; gap: 10px; margin-bottom: 16px; }
    
    .divider-text { display: flex; align-items: center; gap: 12px; margin-top: 24px; margin-bottom: 24px; }
    .divider-text::before, .divider-text::after { content: ''; flex: 1; height: 1px; }
    [data-theme="light"] .divider-text::before, [data-theme="light"] .divider-text::after { background: rgba(0,0,0,0.1); }
    [data-theme="dark"] .divider-text::before, [data-theme="dark"] .divider-text::after { background: rgba(255,255,255,0.15); }
    
    .divider-text span { font-size: 0.78rem; white-space: nowrap; }
    
    .forgot-link { font-size: 0.82rem; color: var(--color-primary); font-weight: 600; text-decoration: none; }
    .forgot-link:hover { text-decoration: underline; color: var(--color-primary-light); }
    
    .login-footer-text { text-align: center; font-size: 0.82rem; margin-top: 24px; }
    [data-theme="light"] .login-footer-text { color: var(--color-text-secondary); }
    [data-theme="dark"] .login-footer-text { color: rgba(255,255,255,0.7); }

    .login-footer-text a { color: var(--color-primary); font-weight: 600; }
    .login-footer-text a:hover { text-decoration: underline; color: var(--color-primary-light); }
    
    .password-wrapper { position: relative; }
    .password-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; transition: color 0.3s; }
    [data-theme="light"] .password-toggle { color: rgba(0,0,0,0.4); }
    [data-theme="dark"] .password-toggle { color: rgba(255,255,255,0.5); }
    .password-toggle:hover { color: var(--color-primary); }

    .back-link { font-size: 0.78rem; text-decoration: none; transition: color 0.3s; }
    [data-theme="light"] .back-link { color: var(--color-text-muted); }
    [data-theme="dark"] .back-link { color: rgba(255,255,255,0.5); }
    .back-link:hover { color: var(--color-primary); }

    @media (max-width: 480px) {
      .glass-card { padding: 40px 24px; border: none; border-radius: 0; border-radius: 16px; }
      .login-wrapper { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <!-- Floating Toggles -->
  <div class="auth-toggles" style="position:fixed; top:20px; right:20px; z-index:1000; display:flex; gap:10px;">
    <button class="navbar-icon-btn" data-theme-toggle aria-label="Toggle dark mode" style="background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); color:white; border:1px solid rgba(255,255,255,0.2); width:40px; height:40px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;">
      <i class="fas fa-moon"></i>
    </button>
    <button class="navbar-icon-btn" data-dir-toggle aria-label="Toggle RTL/LTR" style="background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); color:white; border:1px solid rgba(255,255,255,0.2); width:40px; height:40px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center;">
      <i class="fas fa-globe"></i>
    </button>
  </div>

  <div class="login-wrapper">
    <main class="glass-card" aria-label="Login form">
      <!-- Logo -->
      <a href="index.html" class="login-form-logo" aria-label="RV adven Rentals home">
        <div class="login-form-logo-icon"><i class="fas fa-campground"></i></div>
        <div class="login-form-logo-name">RV adven</div>
        <div class="login-form-logo-tag">Rentals & Guides</div>
      </a>

      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to continue your adventure</p>

      <!-- Social Login -->
      <div class="social-login-row" role="group" aria-label="Social login options">
        <button class="btn btn-light-glass w-full" id="google-login-btn" type="button" aria-label="Sign in with Google">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.21-8.16 2.21-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
          Google
        </button>
        <button class="btn btn-light-glass w-full" id="apple-login-btn" type="button" aria-label="Sign in with Apple"><i class="fab fa-apple"></i> Apple</button>
      </div>

      <div class="divider-text"><span>or sign in with email</span></div>

      <!-- Email/Password Form -->
      <form data-validate id="login-form" novalidate>
        <div class="form-group" style="margin-bottom:16px;">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" class="form-input" id="login-email" name="email" required placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group" style="margin-bottom:8px;">
          <label class="form-label" for="login-password">Password</label>
          <div class="password-wrapper">
            <input type="password" class="form-input" id="login-password" name="password" required placeholder="••••••••" autocomplete="current-password" minlength="8" />
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:8px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem;">
            <input type="checkbox" id="remember-me" style="accent-color:var(--color-primary);width:16px;height:16px;" />
            <span class="form-label" style="margin-bottom:0;">Remember me</span>
          </label>
          <a href="#" class="forgot-link" id="forgot-password-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="login-submit-btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      </form>

      <div class="login-footer-text">
        Don't have an account? <a href="register.html" id="go-register-link">Create one free</a>
      </div>
      <div class="login-footer-text" style="margin-top:16px;">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
      </div>
    </main>
  </div>

  <script src="../assets/js/main.js" defer></script>
</body>
</html>
