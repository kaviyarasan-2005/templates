<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your SaaS account">
  <title>Register - SaaS Template</title>
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">

      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Start your SaaS journey today</p>
      </div>

      <form>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="registerPassword" placeholder="Create password" required />
            <span onclick="togglePassword('registerPassword')">👁</span>
          </div>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm password" required />
        </div>

        <div class="form-options">
          <label>
            <input type="checkbox" required /> I agree to Terms & Privacy
          </label>
        </div>

        <button type="submit" class="btn-primary">Create Account</button>

        <div class="auth-footer">
          <p>Already have an account? <a href="index.html">Login</a></p>
        </div>

      </form>

    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
