<!DOCTYPE html><html lang="en">
    <head><meta charset="UTF-8">
        <title>Dashboard - CloudVault</title>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css"></head>
        <body><div class="dashboard">
            <aside class="sidebar">
                <div class="logo">CLOUDVAULT</div>
                <ul class="sidebar-nav"><li>
                    <a href="#" class="active">DASHBOARD</a></li>
                    <li><a href="#">FILES</a></li>
                    <li><a href="#">SHARED</a></li>
                    <li><a href="#">SETTINGS</a></li>
                    <li><a href="login.html">LOGOUT</a></li>
                </ul></aside><main class="dashboard-content">
                    <div class="dashboard-header">
                        <div><h1>MY DASHBOARD</h1></div>
                        <div class="nav-controls">
                            <button class="theme-toggle">DARK</button>
                            <button class="rtl-toggle">RTL</button></div>
                        </div>
                        <div class="dashboard-cards">
                            <div class="dashboard-card"><h4>STORAGE USED</h4>
                                <div class="dashboard-card-value">45GB</div>
                                <p style="color: var(--text-muted); font-size: 0.875rem;">of 100GB</p>
                            </div><div class="dashboard-card"><h4>FILES</h4>
                                <div class="dashboard-card-value">1,247</div>
                            </div><div class="dashboard-card"><h4>SHARED</h4>
                                <div class="dashboard-card-value">89</div>
                            </div>
                            <div class="dashboard-card">
                                <h4>TEAM</h4>
                                <div class="dashboard-card-value">12</div>
                            </div>
                        </div>
                    </main></div><script src="main.js"></script>
                </body>
                </html>
